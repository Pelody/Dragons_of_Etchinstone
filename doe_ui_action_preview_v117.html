<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dragons of Etchinstone</title>
<style>
  :root{
    --water:#3b82f6; --fire:#ef4444; --lightning:#eab308; --shadow:#a78bfa;
    --bg:#0f1220; --panel:#1b2030; --panel2:#252b40; --line:#39405c; --txt:#e7e9f3; --muted:#9aa3c0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;font-size:16px;line-height:1.45}
  #app{max-width:560px;margin:0 auto;padding:10px 10px 90px}
  .top{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;position:static;margin-bottom:12px}
  .top b{font-size:18px;line-height:1.15;display:block;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.top>div:first-child{flex:1 1 auto;min-width:0}
  .top-right{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .tool-btn{appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:10px;padding:7px 10px;font-size:14px;font-weight:700;min-height:0;flex:0 0 auto;white-space:nowrap;align-self:center}
  .deckbox{border:1px solid var(--line);background:#0000001f;border-radius:10px;padding:6px 8px;line-height:1.25;text-align:left;min-width:64px;color:var(--txt);font-size:12.5px;white-space:nowrap}
  .muted{color:var(--muted);font-size:13px}
  h2{font-size:17px;margin:14px 2px 6px}
  .banner{background:linear-gradient(90deg,#2a2f4a,#1b2030);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:12px 0}
  .row{display:flex;flex-wrap:wrap;gap:8px}
  .card{position:relative;flex:1 1 calc(50% - 8px);min-width:150px;background:var(--panel);border:1px solid var(--line);border-left:6px solid var(--line);border-radius:12px;padding:8px 10px}
  .card.sel{outline:2px solid #6ee7ff;background:var(--panel2)}
  .card.isback{outline:2px dashed #f59e0baa}
  .face{display:flex;gap:6px;margin-top:2px}
  .half{flex:1;min-width:0}
  .half.flip{transform:rotate(180deg)}
  .cardname{font-size:16px;font-weight:600;display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;margin:1px 1px 3px}
  .cardname.flip{transform:rotate(180deg);margin:3px 1px 1px}
  .cardname .cn{overflow:hidden;text-overflow:ellipsis}
  .lvtag{background:#000a;border-radius:6px;padding:1px 6px;font-size:13px;flex:none}
  .rolepop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#0b0e18f2;border:1px solid #fff3;border-radius:9px;padding:3px 10px;font-size:16px;font-weight:700;z-index:4;pointer-events:none;letter-spacing:.3px;white-space:nowrap}
  .rp-s{color:#22c55e;border-color:#22c55e}
  .rp-e{color:#60a5fa;border-color:#60a5fa}
  .rp-b{color:#f59e0b;border-color:#f59e0b}
  .rp-s2{color:#22c55e;border-color:#22c55e;background:#f8fafc}
  .rp-e2{color:#60a5fa;border-color:#60a5fa;background:#f8fafc}
  .rp-b2{color:#f59e0b;border-color:#f59e0b;background:#f8fafc}
  .rp-dmg{color:#fca5a5;border-color:#ef4444}
  .rp-up{color:#34d399;border-color:#34d399}
  .rp-warn{color:#fca5a5;border-color:#ef4444}
  .r{display:flex;align-items:center;gap:5px;font-size:19px;margin:3px 0}
  .r b{font-weight:700}
  .card .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
  .chips{display:flex;flex-wrap:wrap;gap:5px 9px;margin-top:6px}
  .chips.big{gap:9px 14px;font-size:19px}
  .chip{display:inline-flex;align-items:center;gap:3px;font-size:16px;color:var(--txt)}
  .chip b{font-weight:700}
  .tier{display:inline-flex;align-items:center;gap:1px;background:#0006;border-radius:8px;padding:2px 6px}
  svg{flex:none}
  .legendbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 12px;margin:8px 0;font-size:14px}
  .legendbox summary{cursor:pointer;color:var(--muted)}
  #legend{margin-top:8px}
  .card .lv{position:absolute;top:6px;right:8px;font-size:11px;background:#000a;border-radius:8px;padding:1px 6px}
  .badge{position:absolute;top:6px;left:8px;font-size:11px;font-weight:700;border-radius:8px;padding:1px 7px}
  .b-s{background:#22c55e;color:#062} .b-e{background:#60a5fa;color:#013} .b-b{background:#f59e0b;color:#310} .b-r{background:#555;color:#ddd} .b-c{background:#ef4444;color:#fff}
  .w{border-left-color:var(--water)} .f{border-left-color:var(--fire)} .l{border-left-color:var(--lightning)} .s{border-left-color:var(--shadow)}
  .enc{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:12px 0}
  .enc .nm{font-weight:700;font-size:17px}
  .pill{display:inline-block;background:#000a;border-radius:8px;padding:2px 9px;margin:2px 4px 2px 0;font-size:14px}
  .btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  button{appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:12px;padding:12px 14px;font-size:16px;font-weight:600;flex:1 1 auto;min-height:46px}
  button.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
  button.warn{background:#7c3aed;border-color:#7c3aed;color:#fff}
  button.ghost{background:transparent}
  button:disabled{opacity:.4}
  .toggle{display:flex;gap:6px}
  .toggle button.on{background:#22c55e;border-color:#22c55e;color:#042}
  .action-toolbar{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .action-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .action-controls button{flex:0 0 auto;padding:10px 12px;min-height:42px}
  .boost-switch{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:12px;padding:4px 5px;background:#00000018;min-height:42px}
  .boost-switch .bs-label{font-size:13px;font-weight:800;color:var(--muted);padding:0 2px}
  .boost-switch button{padding:6px 12px;min-height:32px;border-radius:9px;font-size:15px;flex:0 0 auto}
  .boost-switch button.on{background:#22c55e;border-color:#22c55e;color:#042}
  .confirm-row{display:flex;gap:8px}
  .confirm-row button{width:100%;flex:1 1 auto}
  .elem-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:8px}
  .elem-row button{padding:10px 6px;min-height:42px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap}
  .fuse-box{margin-top:2px;padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:#00000018}
  .fuse-note{font-size:13px;line-height:1.45;color:var(--muted)}
  .fuse-now{font-size:13px;line-height:1.45;color:var(--txt);margin-top:6px}
  .ranged-option{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#00000024;border:1px solid #ffffff12;border-radius:12px;padding:8px 10px;margin:8px 0;font-size:13px}
  .ranged-option .left{display:flex;align-items:center;gap:6px;min-width:0}
  .ranged-option button{flex:0 0 auto;min-height:30px;padding:6px 10px;border-radius:9px;font-size:13px}
  #log{background:#0b0e18;border:1px solid var(--line);border-radius:12px;padding:8px 10px;font-size:13.5px;color:#cdd3ea;max-height:30vh;overflow:auto;white-space:pre-wrap}
  .end{text-align:center;padding:24px 10px}
  .end .big{font-size:30px;margin:8px}
  .hintbar{display:none}


  /* --- UI redesign: current-level cards + info-button 4-level preview --- */
  .row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;align-items:stretch}
  .card{min-width:0;min-height:198px;display:flex;flex-direction:column;gap:6px;padding:8px 9px;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .cardname,.cardname.flip,.face,.half,.half.flip{display:none!important}
  .card-head{display:flex;align-items:center;justify-content:space-between;gap:6px;border-bottom:1px solid #ffffff18;padding-bottom:5px;min-height:30px}
  .card-title{min-width:0;font-weight:700;font-size:15px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px;min-height:22px}.card-title svg{margin-top:0;flex:0 0 auto}.card-title span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;word-break:normal;min-width:0}
  .card-sub{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;margin-top:4px;white-space:nowrap;min-height:22px}
  .level-badge{background:#000a;border:1px solid #ffffff24;border-radius:8px;padding:1px 6px;color:#fff;font-size:12px;font-weight:800;flex:0 0 auto}
  .info-btn{width:30px;height:30px;min-height:0;flex:0 0 auto;border-radius:999px;padding:0;font-size:16px;line-height:1;background:#0006;border:1px solid #ffffff2a;color:#d8ddf0}
  .info-btn:active{transform:scale(.96)}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1}
  .stat-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:#00000024;border:1px solid #ffffff12;border-radius:8px;min-height:54px;padding:5px 3px}
  .stat-label{display:flex;align-items:center;justify-content:center;gap:4px;font-size:12px;color:var(--muted);line-height:1.05;white-space:nowrap}
  .stat-value{font-size:22px;font-weight:800;line-height:1.1;margin-top:2px;color:#fff;white-space:nowrap}
  .stat-value.small{font-size:17px}
  .enh-row{display:flex;flex-direction:row;align-items:center;justify-content:center;text-align:center;gap:8px;background:#00000030;border:1px solid #ffffff18;border-radius:9px;min-height:50px;padding:6px 8px}
  .enh-label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap}
  .enh-value{font-size:20px;font-weight:800;line-height:1;white-space:nowrap}
  .rolepop{position:static;transform:none;display:inline-flex;align-items:center;justify-content:center;margin-top:0;align-self:auto;background:#0b0e18d8;border:1px solid #fff3;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:800;letter-spacing:.2px;pointer-events:none;white-space:nowrap}
  .card-foot{display:none}
  .card-hint{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;flex:1}

  .dual-icons{display:inline-flex;align-items:center;gap:0;line-height:0}.dual-icons svg+svg{margin-left:-7px}.stat-label .dual-icons{margin-right:1px}
  .stat-grid.six{grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,minmax(49px,1fr));gap:6px}.stat-grid.six .stat-cell{min-height:49px}.stat-grid.six .stat-label{font-size:11px}.stat-grid.six .stat-value{font-size:19px}
  .enh-cell .stat-label span{font-size:11px}.stat-grid.six .enh-cell .stat-label span{font-size:10px}.effect-cell .stat-label span{font-size:10px}.effect-value{font-size:15px;font-weight:800;line-height:1.05;color:#fff;white-space:nowrap}
  .effects-row{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-top:6px}.effect-chip{display:inline-flex;align-items:center;gap:4px;background:#00000030;border:1px solid #ffffff16;border-radius:999px;padding:2px 7px;font-size:12px;line-height:1.2;color:var(--txt);white-space:nowrap}.effect-chip.hardship{background:#3b2359;border-color:#a78bfa55}.effect-chip.enemy-ability{background:#4a241e;border-color:#fb923c55}.effect-chip.journey-peril{background:#1f3b4d;border-color:#67e8f955}.effect-chip svg{flex:0 0 auto}
  .region-board{margin:12px 0}
  .rb-title{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-bottom:12px;color:#e7e9f3;padding:0 2px}
  .rb-title-main{font-size:18px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px}
  .rb-title-sub{font-size:14px;color:#b2bad3;white-space:nowrap;font-weight:700}
  .rb-enemies{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .rb-journeys{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-top:8px}
  .rb-card{position:relative;min-width:0;background:#1b2030;border:1px solid #ffffff14;border-radius:14px;padding:7px;overflow:hidden;box-shadow:inset 0 10px 30px #00000018}
  .rb-card.current{background:rgba(250,204,21,.08);border-color:#facc15b8;box-shadow:0 0 0 2px #facc1540 inset}
  .rb-current{display:none}
  .rb-num-pill{display:inline-flex;align-items:center;justify-content:center;gap:3px;background:#00000042;border:1px solid #ffffff16;border-radius:9px;padding:2px 5px;font-size:14px;font-weight:900;line-height:1;min-height:26px;color:#fff;white-space:nowrap}
  .rb-num-pill svg{flex:0 0 auto}
  .rb-num-pill.small{font-size:10px;min-height:22px;padding:1px 4px;border-radius:8px;gap:2px}
  .rb-num-pill.armor{justify-content:flex-start}
  .rb-enemy{min-height:142px;padding:7px}
  .rb-enemy-wrap{display:grid;grid-template-columns:42px 1fr;gap:7px;min-height:128px}
  .rb-side-stats{display:flex;flex-direction:column;gap:4px}
  .rb-armor-group{display:flex;flex-direction:column;gap:4px}
  .rb-underfx{display:flex;flex-direction:column;gap:2px;margin-top:1px}
  .rb-art-panel{display:flex;flex-direction:column;min-width:0;min-height:0}
  .rb-art-box{position:relative;flex:1;min-height:82px;border-radius:12px;border:1px solid #ffffff14;background:#1a2030;overflow:hidden}
  .rb-art-box::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02) 44%,rgba(0,0,0,.1));}

  .rb-art-box .rb-watermark svg{filter:drop-shadow(0 6px 18px rgba(0,0,0,.18))}
  .rb-xp-corner{position:absolute;right:6px;bottom:6px;display:inline-flex;align-items:center;justify-content:center;gap:3px;background:#00000055;border:1px solid #ffffff16;border-radius:9px;padding:2px 6px;font-size:14px;font-weight:900;line-height:1;min-height:26px;color:#fff}
  .rb-xp-corner.left{left:6px;right:auto}
  .rb-xp-corner.right{right:6px;left:auto}
  .rb-journey .rb-xp-corner{font-size:10px;min-height:22px;padding:1px 4px;border-radius:8px;gap:2px}
  .rb-art-fx-left{position:absolute;left:6px;bottom:6px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;max-width:calc(100% - 56px);z-index:2}
  .rb-art-fx-right{position:absolute;right:6px;bottom:6px;display:flex;flex-direction:column;align-items:flex-end;gap:3px;max-width:calc(100% - 56px);z-index:2}
  .rb-art-fx-top-right{position:absolute;top:6px;right:6px;display:flex;flex-direction:column;align-items:flex-end;gap:3px;max-width:calc(100% - 14px);z-index:2}
  .rb-journey-stats .rb-num-pill{width:100%;justify-content:center}

  .rb-enemy .effect-chip{font-size:8px;padding:1px 5px;gap:3px;max-width:100%}
  .rb-enemy .effect-chip span{max-width:88px;overflow:hidden;text-overflow:ellipsis}
  .rb-journey{min-height:156px;padding:6px 6px}
  .rb-journey-wrap{display:flex;flex-direction:column;min-height:144px;gap:4px}
  .rb-journey-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:4px}
  .rb-journey-art{position:relative;flex:1;min-height:112px;border-radius:11px;border:1px solid #ffffff12;background:#1a2030;overflow:hidden}
  .rb-journey-art::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02) 46%,rgba(0,0,0,.1));}
  .rb-journey-art .rb-watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.9}
  .rb-peril-top{position:absolute;top:5px;right:5px;display:flex;flex-direction:column;align-items:flex-end;gap:3px;max-width:calc(100% - 10px);z-index:2}
  .rb-journey-foot{display:none}
  .rb-xp-bottom{display:inline-flex;align-items:center;gap:2px;background:#00000048;border:1px solid #ffffff14;border-radius:999px;padding:1px 5px;font-size:10px;font-weight:900;color:#fff}
  .rb-fx-bottom{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:0}
  .rb-journey .effect-chip{font-size:8px;padding:1px 4px;gap:2px}
  .rb-journey .effect-chip span{max-width:48px;overflow:hidden;text-overflow:ellipsis}
  .hand-preview-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;align-items:stretch}
.legend-section{margin-top:18px;padding-top:2px}.legend-section+.legend-section{margin-top:26px;padding-top:18px;border-top:1px solid #ffffff12}.legend-title{display:block;font-weight:800;color:#e7e9f3;margin:0 0 12px;font-size:18px}.legend-basic-grid{display:grid!important;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px 8px!important;align-items:stretch}.legend-icon-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-height:60px;padding:8px 5px;border:1px solid #ffffff12;border-radius:12px;background:rgba(255,255,255,.04);text-align:center;font-size:12px;font-weight:700;color:var(--txt)}.legend-icon-card svg{width:20px;height:20px}.legend-icon-card.wide{grid-column:span 2;min-height:60px;flex-direction:row;justify-content:center;gap:8px}.legend-rule-list{display:flex;flex-direction:column;gap:10px}.legend-rule-item{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:flex-start;padding:11px 12px;border:1px solid #ffffff10;border-radius:14px;background:rgba(255,255,255,.035)}.legend-rule-icon{display:flex;align-items:center;justify-content:center;width:24px;padding-top:2px}.legend-rule-body{min-width:0}.legend-rule-name{font-size:16px;font-weight:800;line-height:1.2;color:#eef2ff}.legend-rule-desc{margin-top:2px;color:var(--muted);font-size:13px;line-height:1.45}.legend-inline-ele{display:flex;align-items:center;justify-content:center;gap:6px}.legend-inline-ele svg{flex:0 0 auto}

  .preview-overlay{position:fixed;inset:0;z-index:50;background:rgba(3,6,14,.72);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;padding:24px 16px}
  .preview-modal{width:min(520px,100%);max-height:calc(100svh - 48px);overflow:auto;background:#111522f2;border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 80px #000c;padding:12px;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .preview-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:2px 2px 10px;border-bottom:1px solid #ffffff16;margin-bottom:10px}
  .preview-title{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .preview-close{width:34px;height:34px;min-height:0;padding:0;border-radius:999px;flex:0 0 auto;background:#0006}
  .preview-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-auto-rows:1fr;gap:8px}
  .level-card{height:236px;display:flex;flex-direction:column;gap:6px;background:var(--panel);border:1px solid var(--line);border-left:6px solid var(--line);border-radius:12px;padding:8px;min-width:0}

  .level-title{display:flex;align-items:center;justify-content:space-between;gap:4px;font-weight:800;font-size:15px;border-bottom:1px solid #ffffff16;padding-bottom:5px}
  .current-tag{font-size:11px;background:#facc15;color:#2a2100;border-radius:999px;padding:1px 7px;font-weight:900}
  .preview-grid .stat-cell{min-height:42px;padding:3px 2px}
  .preview-grid .stat-label{font-size:11px}
  .preview-grid .stat-value{font-size:18px}
  .preview-grid .stat-value.small{font-size:15px}
  .preview-grid .enh-row{min-height:44px;padding:3px 6px;gap:6px}
  .preview-grid .enh-label{font-size:10px}
  .preview-grid .enh-value{font-size:17px;white-space:normal}
  .level-note{margin-top:auto;text-align:center;font-size:12px;color:var(--muted);border-top:1px solid #ffffff16;padding-top:4px;min-height:24px}

<script>
/* Dragons of Etchinstone — 規則引擎（JS 移植自 prototype.py / doe_data.py）
   可在瀏覽器與 node 使用。狀態機式 WebGame 供 UI 逐步操作。 */
(function (root) {
  "use strict";

  // ---------- 種子亂數 (mulberry32) ----------
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function shuffle(arr, rnd) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rnd() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  const ceilHalf = (x) => Math.floor((x + 1) / 2);

  // ---------- 工具 ----------
  function elementOf(set) {
    if (set.fusedElement) return set.fusedElement;
    return set.element ? set.element.cardElement : null;
  }
  function curLevel(card) { return card.levels[card.level]; }
  function pickAction(spell, elem) {
    const enh = curLevel(spell).enhanced;
    if (elem != null && enh.element != null && elem === enh.element)
      return [enh, "enhanced"];
    return [curLevel(spell).basic, "basic"];
  }
  function actionSupports(action, kind) {
    const t = action.type;
    return t === kind || t === "both" || t === "attack/move" || t === "move/attack";
  }
  function actionValue(action, kind) {
    return actionSupports(action, kind) ? action.value : 1;
  }
  function boostValue(set, init, hardships) {
    let b = set.boost ? curLevel(set.boost).boost : 0;
    if (hardships.includes("night_travel")) b = Math.max(0, b - init);
    return b;
  }
  function cleanEffects(list) {
    return (list || []).filter(x => x && x !== "none");
  }
  function effName(e) {
    const M = {
      night_travel: "Night Travel",
      hazards: "Hazards",
      storm: "Storm",
      ambush: "Ambush",
      ranged: "Ranged",
      slow: "Slow",
      freeze: "Freeze",
      poison: "Poison",
      steep: "Steep",
      treacherous: "Treacherous"
    };
    return M[e] || String(e);
  }
  function effDesc(e) {
    const M = {
      night_travel: "Boost 會先扣除 Initiative，最低為 0",
      hazards: "Early / Combat Damage 會增加時間懲罰",
      storm: "若承受時間懲罰，會額外承受等量傷害",
      ambush: "Early Damage 會加倍",
      ranged: "即使先攻足夠仍會造成 Early Damage，可棄預備卡忽略",
      slow: "可用 Move 取代 Attack 與 HP 比較",
      freeze: "若受到 Early Damage，清理階段須棄預備卡",
      poison: "若受到傷害，下一手牌追加傷害",
      steep: "MP 會增加預備卡 Boost",
      treacherous: "未完全勝利時，時間懲罰後再受 1 傷害"
    };
    return M[e] || "特殊效果";
  }
  function logEffects(log, label, list) {
    cleanEffects(list).forEach(e => log.push(`${label}：${effName(e)}｜${effDesc(e)}`));
  }

  // ---------- 結算：敵人 ----------
  function resolveEnemy(set, enemy, hardships, opts) {
    hardships = cleanEffects(hardships); opts = opts || {};
    const log = [];
    logEffects(log, "玩家卡苦難啟用", hardships);
    if (enemy.ability) logEffects(log, "敵人能力啟用", [enemy.ability]);

    let init = set.element ? curLevel(set.element).initiative : 0;
    const rawBoost = set.boost ? curLevel(set.boost).boost : 0;
    const b = boostValue(set, init, hardships);
    if (hardships.includes("night_travel")) {
      log.push(`Night Travel 觸發：Boost ${rawBoost} - Initiative ${init} → ${b}`);
    }
    const elem = elementOf(set);
    const [action, used] = pickAction(set.spell, elem);

    if (used === "enhanced") {
      log.push(`強化觸發：Element ${elem} 匹配 ${set.spell.name} 的 Enhanced Element`);
    } else if (elem) {
      log.push(`強化未觸發：Element ${elem} 未匹配 ${set.spell.name} 的 Enhanced Element ${curLevel(set.spell).enhanced.element}`);
    } else {
      log.push("強化未觸發：未指定 Element");
    }

    let atk = actionValue(action, "attack");
    let move = actionValue(action, "move");
    const isEnhAttack = (used === "enhanced" && actionSupports(action, "attack"));
    const atkElem = isEnhAttack ? curLevel(set.spell).enhanced.element : null;

    if (set.boostTarget === "initiative") { init += b; log.push(`Boost 指向 Initiative：+${b}`); }
    else if (set.boostTarget === "move") { move += b; log.push(`Boost 指向 Move：+${b}`); }
    else { atk += b; log.push(`Boost 指向 Attack：+${b}`); }
    log.push(`先攻=${init}，攻擊=${atk}${isEnhAttack ? `（強化${atkElem}）` : `（${used}）`}`);

    if (isEnhAttack) {
      const armors = enemy.armor || (enemy.armorElement != null ? [{ value: enemy.armorValue, element: enemy.armorElement }] : []);
      let matchedArmor = false;
      for (const ar of armors) {
        if (ar.element && ar.element === atkElem) {
          matchedArmor = true;
          atk = Math.max(0, atk - ar.value);
          log.push(`敵人護甲觸發：強化攻擊 ${atkElem} 匹配護甲 ${ar.element}${ar.value} → 攻擊扣為 ${atk}`);
          break;
        }
      }
      if (!matchedArmor && armors.length) log.push(`敵人護甲未觸發：強化攻擊元素 ${atkElem} 沒有匹配護甲`);
    }

    let cmp = atk;
    if (enemy.ability === "slow") {
      const useMove = (opts.slowUseMove != null) ? opts.slowUseMove : (move > atk);
      if (useMove) { cmp = move; log.push(`Slow 觸發：改用移動 ${move} 比 HP`); }
      else log.push(`Slow 未使用：仍用攻擊 ${atk} 比 HP`);
    }

    let early = 0, discardReserve = false;
    const ranged = enemy.ability === "ranged";
    const safe = init >= enemy.initiative;
    if (ranged && safe && opts.negateRanged) {
      discardReserve = true; log.push("Ranged 觸發：棄預備卡無視早期傷害");
    } else if (!safe || ranged) {
      early = enemy.attack;
      let why = (ranged && safe) ? "Ranged" : "敵人先攻較高";
      if (ranged && safe) log.push("Ranged 觸發：即使先攻足夠仍會造成 Early Damage");
      if (hardships.includes("ambush")) {
        const before = early;
        early *= 2;
        why += "+Ambush翻倍";
        log.push(`Ambush 觸發：Early Damage ${before} × 2 → ${early}`);
      }
      log.push(`早期傷害 ${early}（${why}）`);
    } else {
      log.push(`早期傷害未觸發：玩家先攻 ${init} >= 敵人先攻 ${enemy.initiative}`);
    }

    let outcome, xp, combat;
    if (cmp >= enemy.hp) { outcome = "完全勝利"; xp = enemy.xp; combat = 0; }
    else if (cmp >= ceilHalf(enemy.hp)) { outcome = "險勝"; xp = enemy.xp; combat = enemy.attack; }
    else { outcome = "失敗"; xp = 0; combat = enemy.attack; }
    log.push(`值 ${cmp} vs HP ${enemy.hp}（門檻 ${ceilHalf(enemy.hp)}）→ ${outcome}`);

    if (enemy.ability === "freeze") {
      if (early > 0) { discardReserve = true; log.push("Freeze 觸發：受到 Early Damage，清理階段須棄預備卡"); }
      else log.push("Freeze 未觸發：沒有 Early Damage");
    }

    let tp = 0;
    if (hardships.includes("hazards")) {
      tp = (early > 0 ? 1 : 0) + (combat > 0 ? 1 : 0);
      if (tp) log.push(`Hazards 觸發：Early Damage=${early > 0 ? 1 : 0}，Combat Damage=${combat > 0 ? 1 : 0} → +${tp} 時間懲罰`);
      else log.push("Hazards 未觸發：本次沒有 Early / Combat Damage");
    }
    let poison = 0;
    if (enemy.ability === "poison") {
      if (early > 0 || combat > 0) {
        poison = (early > 0 && combat > 0) ? 2 : 1;
        log.push(`Poison 觸發：本次有傷害 → 下一手牌追加 ${poison} 傷害`);
      } else log.push("Poison 未觸發：本次沒有傷害");
    }
    return { outcome, xp, timePenalty: tp, damageEarly: early, damageCombat: combat,
      attackElement: enemy.attackElement, discardReserve, poison, log };
  }

  // ---------- 結算：旅程 ----------
  function resolveJourney(set, journey, hardships, opts) {
    hardships = cleanEffects(hardships); opts = opts || {};
    const log = [];
    logEffects(log, "玩家卡苦難啟用", hardships);
    if (journey.peril) logEffects(log, "旅程危險啟用", [journey.peril]);

    let init = set.element ? curLevel(set.element).initiative : 0;
    const rawBoost = set.boost ? curLevel(set.boost).boost : 0;
    const b = boostValue(set, init, hardships);
    if (hardships.includes("night_travel")) {
      log.push(`Night Travel 觸發：Boost ${rawBoost} - Initiative ${init} → ${b}`);
    }
    const elem = elementOf(set);
    const [action, used] = pickAction(set.spell, elem);

    if (used === "enhanced") {
      log.push(`強化觸發：Element ${elem} 匹配 ${set.spell.name} 的 Enhanced Element`);
    } else if (elem) {
      log.push(`強化未觸發：Element ${elem} 未匹配 ${set.spell.name} 的 Enhanced Element ${curLevel(set.spell).enhanced.element}`);
    } else {
      log.push("強化未觸發：未指定 Element");
    }

    let mv = actionValue(action, "move") + b;
    const isEnhMove = (used === "enhanced" && actionSupports(action, "move"));
    const reserveBoost = opts.reserve ? curLevel(opts.reserve).boost : 0;
    if (isEnhMove && curLevel(set.spell).enhanced.element === journey.mpElement && reserveBoost) {
      mv += reserveBoost; log.push(`Reserve Boost 觸發：強化移動元素 ${curLevel(set.spell).enhanced.element} 匹配 MP ${journey.mpElement} → +${reserveBoost}`);
    } else if (isEnhMove && curLevel(set.spell).enhanced.element === journey.mpElement) {
      log.push("Reserve Boost 未觸發：元素匹配但沒有預備卡 Boost");
    }
    let mp = journey.mp;
    if (journey.peril === "steep") {
      if (reserveBoost) { mp += reserveBoost; log.push(`Steep 觸發：MP + 預備 Boost ${reserveBoost} → ${mp}`); }
      else log.push("Steep 未觸發加值：沒有預備卡 Boost，MP 不增加");
    }

    log.push(`移動 ${mv} vs MP ${mp}（門檻 ${ceilHalf(mp)}）`);
    let outcome, xp, tp;
    if (mv >= mp) { outcome = "完全勝利"; xp = journey.xp; tp = 0; }
    else if (mv >= ceilHalf(mp)) { outcome = "險勝"; xp = journey.xp; tp = journey.timePenalty; }
    else { outcome = "失敗"; xp = 0; tp = journey.timePenalty; }
    log.push(`→ ${outcome}`);
    let dmg = 0;
    if (journey.peril === "treacherous") {
      if (outcome !== "完全勝利") { dmg += 1; log.push("Treacherous 觸發：未完全勝利 → 時間懲罰後再受 1 傷害"); }
      else log.push("Treacherous 未觸發：完全勝利");
    }
    return { outcome, xp, timePenalty: tp, damageOther: dmg, attackElement: null, log };
  }

  // ---------- 懲罰：兩條帳 ----------
  function soakDamage(hand, total, attackElement, order, log) {
    if (total <= 0) return false;
    const idxs = order || hand.map((_, i) => i);
    let remaining = total; const done = new Set();
    for (const i of idxs) {
      if (remaining <= 0) break;
      if (done.has(i) || i >= hand.length) continue;
      const card = hand[i]; const lv = curLevel(card);
      let soak = lv.armorValue;
      const doubled = !!(lv.armorElement && attackElement && lv.armorElement === attackElement);
      if (doubled) soak *= 2;
      remaining -= soak; done.add(i);
      card._downgradedThisEncounter = true;
      if (card.level === 1) { log.push(`${card.name} 吸收 ${soak}${doubled ? "(雙倍)" : ""} → 銷毀`); card.level = 0; }
      else { card.level -= 1; log.push(`${card.name} 吸收 ${soak}${doubled ? "(雙倍)" : ""} → 降到 L${card.level}`); }
    }
    // 移除銷毀
    for (let i = hand.length - 1; i >= 0; i--) if (hand[i].level === 0) hand.splice(i, 1);
    if (remaining > 0) { log.push(`剩餘 ${remaining} 傷害無法吸收 → KO`); return true; }
    return false;
  }
  function resolvePenalty(deck, hand, timePenalty, damage, attackElement, opts) {
    opts = opts || {}; const log = [];
    const discardN = Math.min(timePenalty, deck.length);
    deck.splice(0, discardN);
    const shortfall = timePenalty - discardN;
    if (timePenalty) log.push(`時間懲罰 ${timePenalty}：棄牌庫頂 ${discardN} 張${shortfall ? `，牌不夠 → ${shortfall} 轉成傷害` : ""}`);
    let total = damage + shortfall;
    if (opts.storm && timePenalty > 0) { total += timePenalty; log.push(`Storm 觸發：時間懲罰 ${timePenalty} → 額外 ${timePenalty} 傷害`); }
    else if (opts.storm) { log.push("Storm 未觸發：沒有時間懲罰"); }
    log.push(`傷害總額 = ${total}（攻擊元素 ${attackElement}）`);
    const ko = soakDamage(hand, total, attackElement, opts.order, log);
    if (ko && !opts.finalBattle) {
      log.push("被擊倒(KO)：尚未降級的手牌全降級，棄牌庫頂 4 張，繼續");
      for (let i = hand.length - 1; i >= 0; i--) {
        const card = hand[i];
        if (card._downgradedThisEncounter) continue;
        card._downgradedThisEncounter = true;
        if (card.level === 1) { log.push(`${card.name} KO追加降級 → 銷毀`); card.level = 0; }
        else { card.level -= 1; log.push(`${card.name} KO追加降級 → L${card.level}`); }
      }
      for (let i = hand.length - 1; i >= 0; i--) if (hand[i].level === 0) hand.splice(i, 1);
      deck.splice(0, Math.min(4, deck.length));
    }
    return { knockedOut: ko, log, totalDamage: total };
  }

  function doUpgrade(hand, xp, picks) {
    const log = [`可用 XP = ${xp}`];
    for (const i of picks) {
      const card = hand[i]; if (!card) continue;
      if (card.level >= 4) { log.push(`${card.name} 已滿級`); continue; }
      if (card._downgradedThisEncounter) { log.push(`${card.name} 本遭遇已降級，不能在同一升級階段升級`); continue; }
      const cost = curLevel(card).upgradeCost;
      if (xp >= cost) { xp -= cost; card.level += 1; log.push(`花 ${cost} XP 升級 ${card.name} → L${card.level}（剩 ${xp}）`); }
      else log.push(`XP 不足升級 ${card.name}（需 ${cost}，剩 ${xp}）`);
    }
    log.push(`剩餘 XP ${xp} 清空`);
    return log;
  }

      if (tx.needDiscardReserve && tx.reserveCard) { const i = this.hand.indexOf(tx.reserveCard); if (i >= 0) { this.hand.splice(i, 1); this.discard.push(tx.reserveCard); this.out("清理：棄掉預備卡（Freeze/Ranged）"); } }
      this.drawTo(4);
      if (tx.r.poison && this.hand.length) this.pendingPoison += tx.r.poison;
      if (this.pendingPoison && this.hand.length) {
        this.out(`Poison：新手牌追加 ${this.pendingPoison} 傷害`);
        resolvePenalty(this.deck, this.hand, 0, this.pendingPoison, null, { order: orderDowngrades(this.hand) }).log.forEach(l => this.out(l));
        this.pendingPoison = 0;
      }
      this.tx = null;
      this._clearEncounterFlags();
      if (this.deck.length + this.hand.length < 5) { this._endRegion(); return; }
      this._beginEncounter();
    }
    _endRegion() {
      if (this.regionIdx >= 4) { this._startFinal(); return; }
      this.out(`▷ 地區 ${this.regionIdx} 結束，重洗進入下一區`);
      this.regionIdx += 1; this.reshuffleAll(); this.drawTo(4);
      this._beginEncounter();
    }

    // ---------- 最終戰 ----------
    _startFinal() {
      this.out("—— 最終戰 ——");
      this.reshuffleAll(); this.drawTo(7);
      this.phase = "final_journey_intro";
    }
    // Regroup（整局限一次）：棄 1 張、其餘洗回牌庫後方、重抽 7
    regroup(idx) {
      if (this.regroupUsed || idx == null || !this.hand.length) return false;
      const dropped = this.hand.splice(idx, 1)[0];
      this.discard.push(dropped); shuffle(this.hand, this.rnd);
      this.deck = this.deck.concat(this.hand); this.hand = []; this.drawTo(7);
      this.regroupUsed = true;
      this.out(`Regroup：棄 ${dropped.name}，重抽 7 張`);
      return true;
    }
    // spec = { sets:[{s,e,b,t?,fusedElement?}...], reserveIdx, fuseSetIndex }
    finalJourneyResolve(spec) {
      spec = spec || {};
      const setsSpec = spec.sets || [];
      if (this.phase !== "final_journey" && this.phase !== "final_journey_intro") return this._ruleError("目前不是 Final Journey Phase");
      let reserveIdx = spec.reserveIdx != null ? spec.reserveIdx : null;
      let reserve = reserveIdx != null ? this.hand[reserveIdx] : null;
      let fusedBottom = null;
      const sets = [];
      for (let k = 0; k < setsSpec.length; k++) {
        const s = setsSpec[k];
        if (!s || s.s == null || !this.hand[s.s]) return this._ruleError(`Final Journey 組${k+1} 必須指定 Spell`);
        const usedIdx = [s.s, s.e, s.b].filter(x => x != null);
        if (new Set(usedIdx).size !== usedIdx.length) return this._ruleError(`Final Journey 組${k+1} 有重複角色卡`);
        let fusedEl = null;
        if (spec.fuseSetIndex === k) {
          const vf = validateFuse(this.hand, s.e, reserveIdx, s.fusedElement);
          if (!vf.ok) return this._ruleError(vf.reason);
          fusedEl = vf.fusedElement; fusedBottom = vf.bottom; reserve = null; this.out(`融合：組${k+1} ${vf.top.name} + ${vf.bottom.name} → Element 改為 ${fusedEl}`);
        }
        sets.push(buildSet(this.hand, s.s, s.e, s.b, s.t || "move", fusedEl));
      }
      if (fusedBottom) { const i = this.hand.indexOf(fusedBottom); if (i >= 0) { this.hand.splice(i,1); this.discard.push(fusedBottom); this.out(`融合下方卡 ${fusedBottom.name} 移出手牌`); } }
      const fj = resolveFinalJourney(sets, this.dragon, reserve);
      fj.log.forEach(l => this.out(l));
      if (fj.lose) { this._finish(false); return fj; }
      if (fj.timePenalty) {
        const pen = resolvePenalty(this.deck, this.hand, fj.timePenalty, 0, null, {});
        pen.log.filter(l=>!/^傷害總額 = 0/.test(l)).forEach(l => this.out(l));
        if (pen.knockedOut) { this._finish(false); return fj; }
      }
      this.discard = this.discard.concat(this.hand); this.hand = []; // Rest
      this.hand = this.deck.slice(); this.deck = [];
      this.phase = "final_enemy_intro";
      this.out(`最終敵人：抽光剩餘 ${this.hand.length} 張`);
      return fj;
    }
    finalEnemyResolve(spec) {
      spec = spec || {};
      if (!this.hand.length) { this._finish(false); return null; }
      if (this.phase !== "final_enemy" && this.phase !== "final_enemy_intro") return this._ruleError("目前不是 Final Enemy Phase");
      const setsSpec = spec.sets || [];
      let reserveIdx = spec.reserveIdx != null ? spec.reserveIdx : null;
      let fusedBottom = null;
      const sets = [];
      for (let k = 0; k < setsSpec.length; k++) {
        const s = setsSpec[k];
        if (!s || s.s == null || !this.hand[s.s]) return this._ruleError(`Final Enemy 組${k+1} 必須指定 Spell`);
        const usedIdx = [s.s, s.e, s.b].filter(x => x != null);
        if (new Set(usedIdx).size !== usedIdx.length) return this._ruleError(`Final Enemy 組${k+1} 有重複角色卡`);
        let fusedEl = null;
        if (spec.fuseSetIndex === k) {
          const vf = validateFuse(this.hand, s.e, reserveIdx, s.fusedElement);
          if (!vf.ok) return this._ruleError(vf.reason);
          fusedEl = vf.fusedElement; fusedBottom = vf.bottom; this.out(`融合：組${k+1} ${vf.top.name} + ${vf.bottom.name} → Element 改為 ${fusedEl}`);
        }
        sets.push(buildSet(this.hand, s.s, s.e, s.b, s.t || "attack", fusedEl));
      }
      if (fusedBottom) { const i = this.hand.indexOf(fusedBottom); if (i >= 0) { this.hand.splice(i,1); this.discard.push(fusedBottom); this.out(`融合下方卡 ${fusedBottom.name} 移出手牌`); } }
      const fe = resolveFinalEnemy(sets, this.dragon);
      fe.log.forEach(l => this.out(l));
      if (fe.lose) { this._finish(false); return fe; }
      const pen = resolvePenalty(this.deck, this.hand, 0, fe.totalDamage, fe.damageElement,
        { order: orderDowngrades(this.hand), finalBattle: true });
      pen.log.forEach(l => this.out(l));
      this._finish(!pen.knockedOut);
      return fe;
    }
    _finish(win) {
      const score = win ? this.aliveCards().reduce((s, c) => s + c.level, 0) : 0;
      this.result = { win, score };
      this.phase = "gameover";
      this.out(win ? `🏆 勝利！分數 = ${score}` : "💀 失敗，分數 0");
    }
  }

  root.DOEData = { buildMageCards, buildRegions, buildDragons };
  root.DOEGame = { WebGame, bestAssignment, orderDowngrades, chooseUpgrades, makeTwoSets, makeTwoSetsIdx, buildSet, validateFuse, firstReserveIdx };
  if (typeof module !== "undefined" && module.exports) module.exports = { WebGame, bestAssignment, orderDowngrades, chooseUpgrades, makeTwoSets, makeTwoSetsIdx, buildSet, validateFuse, firstReserveIdx, buildMageCards, buildRegions, buildDragons };
})(typeof window !== "undefined" ? window : globalThis);

}

const START_DRAGONS=["Red Dragon","Yellow Dragon","Blue Dragon","Gray Dragon"];
function dragonColor(name){
  return {"Red Dragon":elc("fire"),"Yellow Dragon":elc("lightning"),"Blue Dragon":elc("water"),"Gray Dragon":elc("shadow")}[name] || "#f8fafc";
}
function dragonPanelStyle(name){
  const c=dragonColor(name);
  return `background:radial-gradient(circle at 50% 28%, ${c}44 0%, transparent 46%), radial-gradient(circle at 24% 78%, ${c}26 0%, transparent 34%), linear-gradient(180deg,#30374f 0%,#171c2b 54%,#0b0e18 100%); border-color:${c}55;`;
}
function dragonShort(name){
  return String(name||"").replace(" Dragon","");
}
function selectStartDragon(name){
  if(!ui) ui=defaultUI();
  ui.startDragon=name;
  render();
}

function hasSave(){
  try{return !!localStorage.getItem(SAVE_KEY);}catch(e){return false;}
}
function getSavedDragonId(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    const data=JSON.parse(raw);
    const game=data&&data.game;
    return game ? (game.dragonId || (game.dragon && game.dragon.name) || null) : null;
  }catch(e){ return null; }
}
function syncStartDragonWithSave(){
  if(!ui || !ui.startScreen) return null;
  const saved=getSavedDragonId();
  if(saved && START_DRAGONS.includes(saved)) ui.startDragon=saved;
  return saved;
}
function autoSave(){
  if(!g || !ui || ui.startScreen || ui.debugMode) return;
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      version:1,
      savedAt:Date.now(),
      game:g
    }));
  }catch(e){
    console.warn("Auto save failed", e);
  }
}
function continueGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw){ alert("目前沒有存檔"); return; }
    const data=JSON.parse(raw);
    if(!data || data.version!==1 || !data.game){ alert("存檔格式不正確"); return; }
    const seed=data.game.saveSeed || 1;
    const dragonId=(data.game.dragonId || (data.game.dragon && data.game.dragon.name) || "Red Dragon");
    g=Object.assign(new DOEGame.WebGame(seed,dragonId), data.game);
    rehydrateGameState();
    ui=defaultUI();
    ui.startScreen=false;
    buildLegend();
    render();
  }catch(e){
    console.warn("Auto load failed", e);
    alert("讀取存檔失敗");
  }
}
function startNewGame(){ openNewGameModal(); }
function startHTML(){
  const canContinue=hasSave();
  const saveNote=canContinue ? "偵測到本機存檔，可繼續上次進度。" : "尚無本機存檔，請開始新遊戲。";
  return `<div class="start-screen">
    <div>
      <div class="start-title">Dragons of Etchinstone</div>
      <div class="start-subtitle">Solo Card Adventure</div>

}

function openNewGameModal(){ ui.newGameDragon="Red Dragon"; ui.newGameModal=true; render(); }
function chooseNewGameDragon(name){ ui.newGameDragon=name; render(); }
function cancelNewGameModal(){ ui.newGameModal=false; render(); }
function confirmNewGame(){
  const chosen=ui.newGameDragon||"Red Dragon";
  if(hasSave() && !confirm("目前有進行中的遊戲，確定要重新開始嗎？")) return;

function debugBossBattle(){

function normEffect(e){ return (e && e !== "none") ? e : null; }
function effectMeta(e){
  const M={
    night_travel:{icon:"shadow", color:"#c4b5fd", label:"Night Travel", short:"Night", group:"Hardship", desc:"Boost 減少你的 Initiative，最低為 0。"},
    hazards:{icon:"mountain", color:"#facc15", label:"Hazards", short:"Hazard", group:"Hardship", desc:"受 Early Damage：+1 時間；受 Combat Damage：再 +1 時間。"},
    storm:{icon:"lightning", color:"#93c5fd", label:"Storm", short:"Storm", group:"Hardship", desc:"若本遭遇承受時間懲罰，追加等量傷害。"},
    ambush:{icon:"sword", color:"#fca5a5", label:"Ambush", short:"Ambush", group:"Hardship", desc:"本遭遇 Early Damage 加倍。"},
    ranged:{icon:"sword", color:"#fbbf24", label:"Ranged", short:"Ranged", group:"Enemy Ability", desc:"即使先攻足夠仍造成 Early Damage；可棄 Reserve 卡忽略。"},
    slow:{icon:"hourglass", color:"#fde68a", label:"Slow", short:"Slow", group:"Enemy Ability", desc:"可用 Move 取代 Attack 與敵人 HP 比較。"},
    freeze:{icon:"water", color:"#93c5fd", label:"Freeze", short:"Freeze", group:"Enemy Ability", desc:"若此敵人造成 Early Damage，清理階段須棄 1 張 Reserve 卡。"},
    poison:{icon:"skull", color:"#86efac", label:"Poison", short:"Poison", group:"Enemy Ability", desc:"受傷時，下一手牌 +1 傷害；若 Early 與 Combat 都受傷則 +2。"},
    steep:{icon:"mountain", color:"#d8b4fe", label:"Steep", short:"Steep", group:"Journey Peril", desc:"Journey MP 加上 Reserve 卡的 Boost。"},
    treacherous:{icon:"skull", color:"#fca5a5", label:"Treacherous", short:"Treach.", group:"Journey Peril", desc:"未完全勝利時，先結算時間懲罰，再受 1 傷害。"},
  };
  return M[e] || {icon:"star", color:"#fcd34d", label:String(e), short:String(e), group:"Effect", desc:"特殊效果。"};
}
function effectChip(e,opts){
  e=normEffect(e); if(!e) return ""; opts=opts||{};
  const m=effectMeta(e);
  const txt=opts.short?m.short:m.label;
  const cls=m.group==="Hardship"?"hardship":m.group==="Enemy Ability"?"enemy-ability":m.group==="Journey Peril"?"journey-peril":"";
  return `<span class="effect-chip ${cls}" title="${m.desc}">${ic(m.icon,m.color,opts.size||15)}<span>${txt}</span></span>`;
}
function effectsHTML(list,opts){ return (list||[]).map(normEffect).filter(Boolean).map(e=>effectChip(e,opts)).join(""); }
function effectStatCell(e,label){
  e=normEffect(e); if(!e) return "";
  const m=effectMeta(e);
  return `<div class="stat-cell effect-cell"><div class="stat-label">${ic(m.icon,m.color,16)}<span>${label||m.group}</span></div><div class="effect-value">${m.short}</div></div>`;
}

function encBaseName(name){
  return String(name||"").replace(/\s*#\d+\s*$/,"");

function armorKey(t){
  const armors=(t&&t.armor&&t.armor.length)?t.armor:(t&&t.armorValue?[{value:t.armorValue,element:t.armorElement}]:[]);
  return armors.map(a=>`${a.value||0}:${a.element||""}`).join("|");
}
function encTargetSame(a,b){
  if(a===b) return true;
  if(!a||!b) return false;
  if(a.name && b.name && a.name===b.name) return true;
  const keys=["hp","initiative","attack","attackElement","xp","ability","mp","mpElement","timePenalty","peril"];
  return keys.every(k=>(a[k]??null)===(b[k]??null)) && armorKey(a)===armorKey(b);
}
function encTargetIndex(list,target){
  if(!list||!target) return -1;
  const direct=list.indexOf(target);
  if(direct>=0) return direct;
  return list.findIndex(x=>encTargetSame(x,target));
}
function repairEncounterReference(){
  if(!g||!g.enc||!g.regions||!g.regions[g.regionIdx]) return;
  const reg=g.regions[g.regionIdx];
  const list=g.enc.encType==="enemy"?reg.enemies:reg.journeys;
  const idx=encTargetIndex(list,g.enc.target);
  if(idx>=0) g.enc.target=list[idx];
}
function makeRestoreRng(seed,count){
  let a = (seed >>> 0) || 1;
  function nextRaw(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  for(let i=0;i<(count||0);i++) nextRaw();
  return nextRaw;
}
function rehydrateGameState(){
  if(!g) return;
  const seed=(g.rndSeed || g.saveSeed || 1) >>> 0;
  const count=Number(g.rndCount||0);
  const raw=makeRestoreRng(seed,count);
  g.rndSeed=seed;
  g.rndCount=count;
  g.rnd=()=>{ g.rndCount+=1; return raw(); };

  const dragonId=g.dragonId || (g.dragon&&g.dragon.name) || "Red Dragon";
  const dragons=DOEData.buildDragons();
  g.dragon=Object.assign(dragons[dragonId] || dragons["Red Dragon"], g.dragon||{});
  g.dragonId=g.dragon.name;

  if(!Array.isArray(g.allCards) || !g.allCards.length) g.allCards=DOEData.buildMageCards();
  const cardMap=new Map();
  g.allCards.forEach(c=>{ if(c&&c.name) cardMap.set(c.name,c); });
  function cardRef(c){
    if(!c || !c.name) return c;
    const ref=cardMap.get(c.name);
    if(!ref) return c;
    if(c.level!=null) ref.level=c.level;
    if(c._downgradedThisEncounter) ref._downgradedThisEncounter=c._downgradedThisEncounter;
    else delete ref._downgradedThisEncounter;
    return ref;
  }
  ["deck","hand","discard"].forEach(zone=>{
    g[zone]=(Array.isArray(g[zone])?g[zone]:[]).map(cardRef);
  });
  if(g.enc){
    g.enc.key=cardRef(g.enc.key);
    repairEncounterReference();
  }
  if(g.tx){
    if(Array.isArray(g.tx.roleCards)) g.tx.roleCards=g.tx.roleCards.map(cardRef);
    g.tx.reserveCard=cardRef(g.tx.reserveCard);
    g.tx.fusedBottom=cardRef(g.tx.fusedBottom);
    if(g.tx.set){
      g.tx.set.spell=cardRef(g.tx.set.spell);
      g.tx.set.element=cardRef(g.tx.set.element);
      g.tx.set.boost=cardRef(g.tx.set.boost);
    }
  }
}

function bindCards(){
  document.querySelectorAll(".card[data-i]").forEach(el=>{
    const idx=parseInt(el.dataset.i,10);
    let timer=null;
    let armed=false;
    let suppressClick=false;
    const clear=()=>{ if(timer){ clearTimeout(timer); timer=null; } };
    el.onpointerdown=(ev)=>{
      if(ev.pointerType==="mouse" && ev.button!==0) return;
      armed=false;
      clear();
      timer=setTimeout(()=>{ armed=true; },520);
    };
    el.onpointerup=(ev)=>{
      clear();
      if(armed){
        suppressClick=true;
        armed=false;
        ev.preventDefault();
        openPreview(idx);
        setTimeout(()=>{ suppressClick=false; },80);
      }
    };
    el.onpointercancel=clear;
    el.onpointerleave=clear;
    el.onclick=(ev)=>{
      if(suppressClick){ ev.preventDefault(); return; }
      cardTap(idx);
    };
  });
}

function cardTap(i){
  if(ui.flipped){ return; }   // 背面只供檢視，要選請先翻回正面
  if(g.phase==="action"){
    const s=ui.sel;
    if(i===s.s){s.s=null;} else if(i===s.e){s.e=null;} else if(i===s.b){s.b=null;}
    else if(s.s===null)s.s=i; else if(s.e===null)s.e=i; else if(s.b===null)s.b=i;
    render();
  } else if(g.phase==="challenge" && ui.diverting){
    return;
  } else if(g.phase==="penalty"){
    const total=penTotal();
    const soaked=ui.dpicks.reduce((s,j)=>s+soakOf(j),0);
    if(total>0 && (total-soaked)>0 && !ui.dpicks.includes(i)) ui.dpicks.push(i);  // 吸滿後不能再選

}

function buildActionPayload(){
  const s=ui.sel; const enemy=g.enc.encType==="enemy";
  if(s.s==null || !g.hand[s.s]) return {ok:false,reason:"必須指定 Spell 卡"};
  const usedArr=[s.s,s.e,s.b].filter(x=>x!=null);
  if(new Set(usedArr).size!==usedArr.length) return {ok:false,reason:"同一張卡不能同時擔任多個角色"};
  const used=new Set(usedArr);
  let reserveIdx=null; for(let i=0;i<g.hand.length;i++) if(!used.has(i)){ reserveIdx=i; break; }
  const hasReserve=reserveIdx!=null;
  let fuse=false, fusedElement=null, reserveCard=hasReserve?g.hand[reserveIdx]:null;
  if(ui.fuse){
    fusedElement=ui.fuseElement || (s.s!=null?curLevel(g.hand[s.s]).enhanced.element:null);
    const vf=DOEGame.validateFuse(g.hand,s.e,reserveIdx,fusedElement);
    if(!vf.ok) return {ok:false,reason:vf.reason};
    fuse=true; reserveCard=null;
  }
  const a={s:s.s,e:s.e,b:s.b,t:enemy?ui.bt:"move",negateRanged:enemy&&g.enc.target.ability==="ranged"&&ui.negateRanged&&hasReserve&&!fuse,fuse,fusedElement};
  const set=DOEGame.buildSet(g.hand,a.s,a.e,a.b,a.t,fusedElement);
  return {ok:true,a,set,reserveIdx,reserveCard,fuse,fusedElement};
}

function calcActionPreview(payload){
  const enc=g.enc, enemy=enc.encType==="enemy", t=enc.target, set=payload.set, a=payload.a;
  const elem=DOEEngine.elementOf(set);
  const picked=DOEEngine.pickAction(set.spell, elem);
  const action=picked[0], used=picked[1];
  const initBase=set.element?curLevel(set.element).initiative:0;
  const rawBoost=set.boost?curLevel(set.boost).boost:0;
  const boost=enc.hardships.includes("night_travel")?Math.max(0,rawBoost-initBase):rawBoost;
  const enhanced=used==="enhanced";
  let result, rows='', targetRows='', effectRows='', outcome='', xp=0, time=0, damage=0;
  if(enc.hardships.includes("night_travel") && rawBoost>0){
    effectRows+=metricRow("boost","#86efac","Night Travel",`${rawBoost}-${initBase}`,boost);
  }
  if(enemy){
    const baseAtk=DOEEngine.actionValue(action,"attack");
    const baseMove=DOEEngine.actionValue(action,"move");
    const initFinal=a.t==="initiative"?initBase+boost:initBase;
    let atk=a.t==="initiative"?baseAtk:baseAtk+boost;
    let armorHit=0;
    const isEnhAttack=enhanced && DOEEngine.actionSupports(action,"attack");
    const atkElem=isEnhAttack?curLevel(set.spell).enhanced.element:null;
    const armors=(t.armor&&t.armor.length)?t.armor:(t.armorValue?[{value:t.armorValue,element:t.armorElement}]:[]);
    if(isEnhAttack){
      for(const ar of armors){
        if(ar.element&&ar.element===atkElem){
          armorHit=ar.value;
          effectRows+=metricRow("shield",elc(ar.element),"敵人護甲",`匹配 ${atkElem}`,`-${ar.value}`);
          break;
        }
      }
    }
    const atkAfter=Math.max(0,atk-armorHit);
    const moveVal=baseMove;
    const useMove=t.ability==="slow" && moveVal>atkAfter;
    result=DOEEngine.resolveEnemy(set,t,enc.hardships,{negateRanged:a.negateRanged});
    outcome=result.outcome; xp=result.xp; time=result.timePenalty; damage=result.damageEarly+result.damageCombat;
    const yourCells=[
      metricCell("init","#cbd5e1","先攻",initFinal,a.t==="initiative"?`${initBase}+${boost}`:`${initBase}`),
      metricCell("sword",atkElem?elc(atkElem):"#cbd5e1",enhanced?"強化攻擊":"攻擊",atkAfter,armorHit?`${baseAtk}${a.t==='attack'?`+${boost}`:''}-${armorHit}`:`${baseAtk}${a.t==='attack'?`+${boost}`:''}`)
    ];
    if(t.ability==="slow"){
      yourCells.push(metricCell("boot","#cbd5e1","Slow 可用移動",moveVal,`${baseMove}`));
      if(useMove) effectRows+=metricRow("boot","#cbd5e1","Slow",`移動 ${moveVal} > 攻擊 ${atkAfter}`,moveVal);
    }
    rows=metricGrid(yourCells);
    const ranged=t.ability==="ranged";
    const safe=initFinal>=t.initiative;
    if(ranged){
      if(safe && a.negateRanged) effectRows+=metricRow("shield","#cbd5e1","Ranged","棄預備卡忽略",0);
      else effectRows+=metricRow("sword",elc(t.attackElement),"Ranged",safe?"先攻足夠仍造成":"敵先攻較高",t.attack);
    }else if(!safe){
      effectRows+=metricRow("sword",elc(t.attackElement),"Early Damage",`${initFinal} < ${t.initiative}`,t.attack);
    }
    if(enc.hardships.includes("ambush") && result.damageEarly>t.attack){
      effectRows+=metricRow("sword",elc(t.attackElement),"Ambush","Early Damage ×2",result.damageEarly);
    }
    if(t.ability==="freeze" && result.damageEarly>0){
      effectRows+=metricRow("shield","#93c5fd","Freeze","受到 Early Damage","棄預備");
    }
    if(enc.hardships.includes("hazards") && result.timePenalty>0){
      effectRows+=metricRow("hourglass","#cbd5e1","Hazards","造成傷害",`+${result.timePenalty}`);
    }
    if(t.ability==="poison" && result.poison>0){
      effectRows+=metricRow("heart","#fca5a5","Poison","本次有傷害",`+${result.poison}`);
    }
    const armorTxt=armors.map(ar=>`${ar.value}`).join('/');
    targetRows=metricGrid([
      metricCell("init","#cbd5e1","敵先攻",t.initiative),
      metricCell("heart","#fca5a5","HP",t.hp),
      metricCell("sword",elc(t.attackElement),"敵攻擊",t.attack),
      metricCell("shield",armors[0]?elc(armors[0].element):"#cbd5e1","護甲",armorTxt)
    ]);
  } else {
    const baseMove=DOEEngine.actionValue(action,"move");
    const isEnhMove=enhanced && DOEEngine.actionSupports(action,"move");
    const reserveBoost=payload.reserveCard?curLevel(payload.reserveCard).boost:0;
    const reserveAdd=(isEnhMove&&curLevel(set.spell).enhanced.element===t.mpElement&&reserveBoost)?reserveBoost:0;
    const mpAdd=(t.peril==="steep"&&reserveBoost)?reserveBoost:0;
    const moveTotal=baseMove+boost+reserveAdd;
    const mpTotal=t.mp+mpAdd;
    result=DOEEngine.resolveJourney(set,t,enc.hardships,{reserve:payload.reserveCard});
    outcome=result.outcome; xp=result.xp; time=result.timePenalty; damage=result.damageOther;
    rows=metricGridRight(metricCell("boot",isEnhMove?elc(curLevel(set.spell).enhanced.element):"#cbd5e1",enhanced?"強化移動":"移動",moveTotal,`${baseMove}+${boost}${reserveAdd?`+${reserveAdd}`:''}`));
    targetRows=metricGrid([
      metricCell("hourglass","#cbd5e1","時間懲罰",t.timePenalty),
      metricCell("mountain",elc(t.mpElement),"MP",mpTotal,mpAdd?`${t.mp}+${mpAdd}`:"")
    ]);
    if(reserveAdd>0){
      effectRows+=metricRow("boost","#86efac","Reserve Boost","匹配 MP 元素",`+${reserveAdd}`);
    }
    if(mpAdd>0){
      effectRows+=metricRow("mountain",elc(t.mpElement),"Steep","MP + 預備 Boost",`+${mpAdd}`);
    }
    if(t.peril==="treacherous" && result.damageOther>0){
      effectRows+=metricRow("heart","#fca5a5","Treacherous","未完全勝利",1);
    }
  }
  const stormExtra=(enc.hardships.includes("storm")&&time>0)?time:0;
  if(stormExtra>0){
    effectRows+=metricRow("heart","#fca5a5","Storm","時間懲罰造成傷害",stormExtra);
  }
  const shortfall=Math.max(0,time-g.deck.length);
  const finalDamage=damage+stormExtra+shortfall;
  return {enemy,rows,targetRows,effectRows,outcome,xp,time,damage:finalDamage,result,enhanced};
}

function rangedPreviewControl(p){
  if(g.enc.encType!=="enemy" || g.enc.target.ability!=="ranged") return "";
  const can = p.reserveIdx!=null && !p.fuse;
  const on = !!p.a.negateRanged;
  const label = can ? (on ? "棄預備忽略" : "不忽略") : "無預備卡";
  return `<div class="ranged-option">
    <div class="left">${effectChip("ranged",{short:true})}<span>${can?"可棄預備卡忽略 Early Damage":"沒有可用預備卡，不能忽略"}</span></div>
    <button class="${on?'warn':'ghost'}" ${can?'':'disabled'} onclick="toggleRangedPreview()">${label}</button>
  </div>`;
}
function toggleRangedPreview(){
  ui.negateRanged=!ui.negateRanged;
  const payload=buildActionPayload();
  if(payload.ok){
    payload.data=calcActionPreview(payload);
    ui.actionPreview=payload;
  }
  render();
}

function actionPreviewHTML(){
  const p=ui.actionPreview; if(!p) return "";
  const d=p.data;
  const enc=g.enc, t=enc.target;
  const resultClass=d.outcome==="完全勝利"?"rp-up":(d.outcome==="失敗"?"rp-warn":"rp-b");
  return `<div class="preview-overlay" onclick="closeActionPreview()">
    <div class="action-modal" onclick="event.stopPropagation()">
      <div class="preview-head"><div class="preview-title">行動預覽</div><button class="preview-close" type="button" onclick="closeActionPreview()">×</button></div>
      <div class="ap-section ${d.rows&&d.rows.includes('single-right')?'single-value':''}"><div class="ap-title">你的總數值</div>${d.rows}</div>
      <div class="ap-section"><div class="ap-title">對象數值${(t.ability||t.peril||enc.hardships.length)?`　${t.ability?effectChip(t.ability,{short:true}):''}${t.peril?effectChip(t.peril,{short:true}):''}${effectsHTML(enc.hardships,{short:true})}`:''}</div>${d.targetRows}</div>
      ${rangedPreviewControl(p)}
      ${d.effectRows?`<div class="ap-section"><div class="ap-title">特殊效果</div>${d.effectRows}</div>`:''}
      <div class="ap-section"><div class="ap-title">結果</div>
        <div class="ap-row"><div class="left"><span class="ap-result ${resultClass}">${d.outcome}</span></div><div class="mid"></div><b></b></div>
        ${metricRow("star","#fcd34d","XP","",`+${d.xp}`)}
        ${metricRow("hourglass","#cbd5e1","時間","",d.time)}
        ${metricRow("heart","#fca5a5","傷害","",d.damage)}
      </div>
      <div class="ap-buttons"><button class="ghost" onclick="closeActionPreview()">取消</button><button class="primary" onclick="executeActionPreview()">確定</button></div>
    </div>
  </div>`;
}
function openActionPreview(){
  const payload=buildActionPayload();
  if(!payload.ok){ alert(payload.reason); return; }
  payload.data=calcActionPreview(payload);
  ui.actionPreview=payload;
  render();
}
function closeActionPreview(){ ui.actionPreview=null; render(); }
function executeActionPreview(){
  const p=ui.actionPreview;
  if(!p) return;
  g.resolveAction(p.a);
  ui.actionPreview=null;
  ui.sel={s:null,e:null,b:null}; ui.fuse=false; ui.fuseElement=null; ui.dpicks=[];
  render();
}
function confirmAction(){ openActionPreview(); }
// 懲罰
function initUpgrade(){ ui.upicks=[]; ui.upSpent=0; ui.upLevels=g.hand.map(c=>c.level); ui.flipped=false; }
function finishPenalty(order){
  g.applyPenalty(order);
  initUpgrade();
  if(g.tx && g.tx.r && g.tx.r.xp<=0){ finishUpgrade([]); return; }
  render();
}
function doPenaltyAuto(){ finishPenalty(null); }
function doPenaltyConfirm(){ finishPenalty(ui.dpicks); }
// 升級
function flash(idx,text,cls){ ui.flash={idx,text,cls}; render();
  setTimeout(()=>{ if(ui.flash&&ui.flash.idx===idx){ ui.flash=null; render(); } },1000); }
function tryUpgrade(i){
  const cur=ui.upLevels[i];
  if(cur>=4){ flash(i,"已滿級","rp-warn"); return; }
  if(g.hand[i]._downgradedThisEncounter){ flash(i,"本回合降級","rp-warn"); return; }
  const cost=g.hand[i].levels[cur].upgradeCost;
  const remaining=g.tx.r.xp-ui.upSpent;
  if(cost<=remaining){ ui.upicks.push(i); ui.upSpent+=cost; ui.upLevels[i]++; render(); }
  else{ flash(i,"No XP","rp-warn"); }
}
function suggestUpgrade(){ clearUpgrade(); for(const i of DOEGame.chooseUpgrades(g.hand,g.tx.r.xp)) tryUpgrade(i); }
function clearUpgrade(){ initUpgrade(); render(); }
function finishUpgrade(picks){ g.applyUpgrade(picks); afterTurn(); }
function afterTurn(){ if(g.phase==="penalty") ui.dpicks=[]; render(); }
// 最終戰
function resetFinalSel(){ ui.fsel={sets:[{s:null,e:null,b:null},{s:null,e:null,b:null}],fuseSet:null,fuseElement:null}; }
function cycleFinal(i){
  const S=ui.fsel.sets, slots=[[0,'s'],[0,'e'],[0,'b'],[1,'s'],[1,'e'],[1,'b']];
  for(const [k,key] of slots){ if(S[k][key]===i){ S[k][key]=null; return; } }
  for(const [k,key] of slots){ if(S[k][key]==null){ S[k][key]=i; return; } }
}
function suggestFinal(kind){
  const r=DOEGame.makeTwoSetsIdx(g.hand, kind==="journey"?"move":"attack");
  resetFinalSel();
  r.sets.forEach((st,k)=>{ ui.fsel.sets[k]={s:st.s,e:st.e==null?null:st.e,b:st.b==null?null:st.b}; });
  render();
}
function clearFinal(){ resetFinalSel(); render(); }
function setFinalFuse(k){ if(!ui.fsel) resetFinalSel(); ui.fsel.fuseSet=k; if(k!=null && !ui.fsel.fuseElement){ const st=ui.fsel.sets[k]; if(st&&st.s!=null) ui.fsel.fuseElement=curLevel(g.hand[st.s]).enhanced.element; } render(); }
function setFinalFuseElement(e){ if(!ui.fsel) resetFinalSel(); ui.fsel.fuseElement=e; render(); }
function startRegroup(){ ui.regroupPick=null; ui.regrouping=true; render(); }
function chooseRegroup(i){ ui.regroupPick=i; render(); }
function cancelRegroup(){ ui.regrouping=false; ui.regroupPick=null; render(); }
function confirmRegroup(){
  if(ui.regroupPick==null) return;
  g.regroup(ui.regroupPick);
  ui.regrouping=false;
  ui.regroupPick=null;
  resetFinalSel();
  render();
}
function startFinalJourney(){
  ui.regrouping=false;
  ui.regroupPick=null;
  ui.handPreviewOpen=false;
  resetFinalSel();
  g.phase="final_journey";
  render();
}
function calcFinalPreviewDetails(kind,built,reserveCard,result){
  const d=g.dragon;
  let rows="", targetRows="", resultRows="", effectRows="";
  if(kind==="journey"){
    const reserveBoost=reserveCard?curLevel(reserveCard).boost:0;
    const mpElems=new Set(d.mpTiers.map(t=>t[1]).filter(Boolean));
    let usedReserve=false, totalMove=0;
    built.forEach((set,idx)=>{
      const elem=DOEEngine.elementOf(set);
      const picked=DOEEngine.pickAction(set.spell,elem);
      const action=picked[0], used=picked[1];
      const base=DOEEngine.actionValue(action,"move");
      const boost=set.boost?curLevel(set.boost).boost:0;
      const enhEl=curLevel(set.spell).enhanced.element;
      const isEnhMove=used==="enhanced" && DOEEngine.actionSupports(action,"move");
      let reserveAdd=0;
      if(!usedReserve && isEnhMove && reserveBoost && mpElems.has(enhEl)){
        reserveAdd=reserveBoost;
        usedReserve=true;
        effectRows+=metricRow("boost","#86efac","預備卡 Boost","匹配 MP 元素",`+${reserveAdd}`);
      }
      const mv=base+boost+reserveAdd;
      totalMove+=mv;
      const formula=`${base}${boost?`+${boost}`:""}${reserveAdd?`+${reserveAdd}`:""}`;
      rows+=metricRow("boot",isEnhMove?elc(enhEl):"#cbd5e1",`組${idx+1} 移動`,formula,mv);
    });
    rows+=metricRow("boot","#cbd5e1","總移動","",totalMove);
    targetRows=d.mpTiers.map((t,i)=>metricRow("mountain",elc(t[1]),`MP 檔 ${i+1}`,`時間 ${t[2]}`,t[0])).join("");
    if(result.lose){
      resultRows+=`<div class="ap-row"><div class="left"><span class="ap-result rp-warn">失敗</span></div><div class="mid">未達第一檔 MP</div><b></b></div>`;
    }else{
      resultRows+=`<div class="ap-row"><div class="left"><span class="ap-result rp-up">通過</span></div><div class="mid"></div><b></b></div>`;
      resultRows+=metricRow("hourglass","#cbd5e1","時間懲罰","",result.timePenalty);
    }
  }else{
    let totalAtkBeforeArmor=0, totalInit=0;
    const enhElems=new Set();
    built.forEach((set,idx)=>{
      const elem=DOEEngine.elementOf(set);
      const picked=DOEEngine.pickAction(set.spell,elem);
      const action=picked[0], used=picked[1];
      const baseAtk=DOEEngine.actionValue(action,"attack");
      const baseInit=set.element?curLevel(set.element).initiative:0;
      const boost=set.boost?curLevel(set.boost).boost:0;
      let atk=baseAtk, init=baseInit;
      if(set.boostTarget==="initiative") init+=boost;
      else atk+=boost;
      totalAtkBeforeArmor+=atk;
      totalInit+=init;
      const enhEl=curLevel(set.spell).enhanced.element;
      const isEnhAttack=used==="enhanced" && DOEEngine.actionSupports(action,"attack");
      if(isEnhAttack) enhElems.add(enhEl);
      rows+=metricRow("sword",isEnhAttack?elc(enhEl):"#cbd5e1",`組${idx+1} 攻擊`,`${baseAtk}${set.boostTarget==="attack"&&boost?`+${boost}`:""}`,atk);
      rows+=metricRow("init","#cbd5e1",`組${idx+1} 先攻`,`${baseInit}${set.boostTarget==="initiative"&&boost?`+${boost}`:""}`,init);
    });
    let armorHit=0;
    d.armor.forEach(ar=>{
      if(enhElems.has(ar.element)){
        armorHit+=ar.value;
        effectRows+=metricRow("shield",elc(ar.element),"龍護甲","匹配強化攻擊",`-${ar.value}`);
      }
    });
    const totalAtk=Math.max(0,totalAtkBeforeArmor-armorHit);
    rows+=metricRow("sword","#cbd5e1","總攻擊",armorHit?`${totalAtkBeforeArmor}-${armorHit}`:"",totalAtk);
    rows+=metricRow("init","#cbd5e1","總先攻","",totalInit);
    targetRows=d.hpTiers.map((t,i)=>metricRow("heart","#fca5a5",`HP 檔 ${i+1}`,`傷害 ${t[1].value}`,t[0])).join("");
    targetRows+=metricRow("init","#cbd5e1","龍先攻","",d.initiative);
    targetRows+=metricRow("sword",elc(d.earlyDamage.element),"Early Attack","",d.earlyDamage.value);
    d.armor.forEach(a=>{ targetRows+=metricRow("shield",elc(a.element),"護甲","",a.value); });
    if(totalInit<d.initiative){
      effectRows+=metricRow("sword",elc(d.earlyDamage.element),"Early Attack",`先攻 ${totalInit} < ${d.initiative}`,d.earlyDamage.value);
    }
    if(result.lose){
      resultRows+=`<div class="ap-row"><div class="left"><span class="ap-result rp-warn">失敗</span></div><div class="mid">未達第一檔 HP</div><b></b></div>`;
    }else{
      resultRows+=`<div class="ap-row"><div class="left"><span class="ap-result rp-up">命中</span></div><div class="mid"></div><b></b></div>`;
      resultRows+=metricRow("heart","#fca5a5","龍總傷害","",result.totalDamage);
      resultRows+=metricRow("sword",result.damageElement?elc(result.damageElement):"#cbd5e1","傷害元素","",result.damageElement||"—");
    }
  }
  return {rows,targetRows,resultRows,effectRows};
}
function buildFinalPayload(kind){
  const t=kind==="journey"?"move":"attack";
  const allSets=ui.fsel.sets;
  const activeSets=allSets.filter(s=>s.s!=null);
  if(!activeSets.length) return {ok:false,reason:"至少要指定一組 Spell"};
  const used=new Set();
  allSets.forEach(s=>[s.s,s.e,s.b].forEach(x=>{if(x!=null)used.add(x);}));
  let reserveIdx=null;
  for(let i=0;i<g.hand.length;i++) if(!used.has(i)){ reserveIdx=i; break; }
  const sets=activeSets.map(s=>({s:s.s,e:s.e,b:s.b,t}));
  let reserveCard=reserveIdx!=null?g.hand[reserveIdx]:null;
  let fuseSetIndex=null;
  if(ui.fsel.fuseSet!=null){
    const k=ui.fsel.fuseSet;
    if(!activeSets[k]) return {ok:false,reason:"融合組別尚未完成指定"};
    const fusedElement=ui.fsel.fuseElement || curLevel(g.hand[activeSets[k].s]).enhanced.element;
    const vf=DOEGame.validateFuse(g.hand,activeSets[k].e,reserveIdx,fusedElement);
    if(!vf.ok) return {ok:false,reason:vf.reason};
    sets[k].fusedElement=fusedElement;
    fuseSetIndex=k;
    reserveCard=null;
  }
  const built=sets.map(s=>DOEGame.buildSet(g.hand,s.s,s.e,s.b,t,s.fusedElement||null));
  const result=kind==="journey"
    ? DOEEngine.resolveFinalJourney(built,g.dragon,reserveCard)
    : DOEEngine.resolveFinalEnemy(built,g.dragon);
  const detail=calcFinalPreviewDetails(kind,built,reserveCard,result);
  return {ok:true,kind,sets,reserveIdx,fuseSetIndex,data:result,detail};
}
function finalPreviewHTML(){
  const p=ui.finalPreview;
  if(!p) return "";
  const isJ=p.kind==="journey";
  const d=p.detail||{};
  const title=isJ?"Final Journey 預覽":"Final Enemy 預覽";
  return `<div class="preview-overlay" onclick="closeFinalPreview()">
    <div class="action-modal" onclick="event.stopPropagation()">
      <div class="preview-head">
        <div class="preview-title">${title}</div>
        <button class="preview-close" type="button" onclick="closeFinalPreview()">×</button>
      </div>
      <div class="ap-section">
        <div class="ap-title">你的總數值</div>
        ${d.rows||""}
      </div>
      <div class="ap-section">
        <div class="ap-title">對象數值</div>
        ${d.targetRows||""}
      </div>
      ${d.effectRows?`<div class="ap-section"><div class="ap-title">特殊效果</div>${d.effectRows}</div>`:""}
      <div class="ap-section">
        <div class="ap-title">結果</div>
        ${d.resultRows||""}
      </div>
      <div class="ap-buttons">
        <button class="ghost" onclick="closeFinalPreview()">取消</button>
        <button class="primary" onclick="executeFinalPreview()">確定結算</button>
      </div>
    </div>
  </div>`;
}
function openFinalPreview(kind){
  const payload=buildFinalPayload(kind);
  if(!payload.ok){ alert(payload.reason); return; }
  ui.finalPreview=payload;
  render();
}
function closeFinalPreview(){ ui.finalPreview=null; render(); }
function executeFinalPreview(){
  const p=ui.finalPreview;
  if(!p) return;
  const kind=p.kind;
  ui.finalPreview=null;
  confirmFinal(kind);
}
function confirmFinal(kind){
  const t=kind==="journey"?"move":"attack";
  const allSets=ui.fsel.sets;
  const sets=allSets.filter(s=>s.s!=null).map(s=>({s:s.s,e:s.e,b:s.b,t}));
  const used=new Set(); allSets.forEach(s=>[s.s,s.e,s.b].forEach(x=>{if(x!=null)used.add(x);}));
  let reserveIdx=null; for(let i=0;i<g.hand.length;i++) if(!used.has(i)){ reserveIdx=i; break; }
  let fuseSetIndex=null;
  if(ui.fsel.fuseSet!=null){
    const k=ui.fsel.fuseSet;
    const activeSets=allSets.filter(s=>s.s!=null);
    if(!activeSets[k]){ alert("融合組別尚未完成指定"); return; }
    const fusedElement=ui.fsel.fuseElement || curLevel(g.hand[activeSets[k].s]).enhanced.element;
    const vf=DOEGame.validateFuse(g.hand,activeSets[k].e,reserveIdx,fusedElement);
    if(!vf.ok){ alert(vf.reason); return; }
    activeSets[k].fusedElement=fusedElement; fuseSetIndex=k;
    sets[k].fusedElement=fusedElement;
  }
  if(kind==="journey"){ g.finalJourneyResolve({sets,reserveIdx,fuseSetIndex}); resetFinalSel(); }
  else { g.finalEnemyResolve({sets,reserveIdx,fuseSetIndex}); }
  afterFinal();
}
function afterFinal(){ render(); }

function setHint(){
  const h=document.getElementById("hint");
  if(!h) return;
  if(ui && ui.startScreen){ h.textContent="開始新遊戲或繼續上次進度"; return; }
  if(ui && ui.debugMode){ h.textContent="Boss 前頁 UI 測試模式，不會覆蓋存檔"; return; }
  const map={
    challenge:"面對遭遇，或繞道（棄關鍵卡+1手牌）",
    action:"指派卡片，其餘為預備；融合=Element卡+未指派卡同元素，並選新元素",
    penalty:"點手牌降級吸收傷害（剩餘歸0），或自動吸收",
    upgrade:"點手牌升級（扣XP，不夠會提示）；或用建議",
    final_journey_intro:"Boss 封面頁：可 Regroup、檢視手牌，或開始 Final Journey",
    final_journey:"循環點卡指派兩組行動（求移動）",
    final_enemy_intro:"循環點卡指派兩組行動（求攻擊），對龍最後一擊",
    gameover:"看看分數，再玩一局！",
  };
  h.textContent=map[g.phase]||"";
}

try {
  ui=defaultUI();
  buildLegend();
  render();
}
catch(e){
  document.getElementById('sub').textContent='發生錯誤';
  document.getElementById('main').innerHTML='<div class="banner">啟動失敗：'+(e&&e.message||e)+'</div>';
}
</script>
