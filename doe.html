<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dragons of Etchinstone</title>
<style>
  :root{
    --water:#3b82f6; --fire:#ef4444; --lightning:#eab308; --shadow:#a78bfa;
    --bg:#0f1220; --panel:#1b2030; --panel2:#252b40; --line:#39405c; --txt:#e7e9f3; --muted:#9aa3c0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;font-size:15px;line-height:1.4}
  #app{max-width:560px;margin:0 auto;padding:10px 10px 90px}
  .top{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 12px;position:sticky;top:6px;z-index:5}
  .top b{font-size:16px}
  .muted{color:var(--muted);font-size:12px}
  h2{font-size:15px;margin:14px 2px 6px}
  .banner{background:linear-gradient(90deg,#2a2f4a,#1b2030);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:8px 0}
  .row{display:flex;flex-wrap:wrap;gap:8px}
  .card{position:relative;flex:1 1 calc(50% - 8px);min-width:150px;background:var(--panel);border:1px solid var(--line);border-left:6px solid var(--line);border-radius:12px;padding:8px 10px}
  .card.sel{outline:2px solid #6ee7ff;background:var(--panel2)}
  .card .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
  .chips{display:flex;flex-wrap:wrap;gap:5px 9px;margin-top:6px}
  .chips.big{gap:7px 12px;font-size:15px}
  .chip{display:inline-flex;align-items:center;gap:2px;font-size:13px;color:var(--txt)}
  .chip b{font-weight:700}
  .tier{display:inline-flex;align-items:center;gap:1px;background:#0006;border-radius:8px;padding:2px 6px}
  svg{flex:none}
  .legendbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 12px;margin:8px 0;font-size:13px}
  .legendbox summary{cursor:pointer;color:var(--muted)}
  #legend{margin-top:8px}
  .card .lv{position:absolute;top:6px;right:8px;font-size:11px;background:#000a;border-radius:8px;padding:1px 6px}
  .badge{position:absolute;top:6px;left:8px;font-size:11px;font-weight:700;border-radius:8px;padding:1px 7px}
  .b-s{background:#22c55e;color:#062} .b-e{background:#60a5fa;color:#013} .b-b{background:#f59e0b;color:#310} .b-r{background:#555;color:#ddd} .b-c{background:#ef4444;color:#fff}
  .w{border-left-color:var(--water)} .f{border-left-color:var(--fire)} .l{border-left-color:var(--lightning)} .s{border-left-color:var(--shadow)}
  .enc{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .enc .nm{font-weight:700}
  .pill{display:inline-block;background:#000a;border-radius:8px;padding:1px 8px;margin:2px 4px 2px 0;font-size:12px}
  .btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  button{appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:12px;padding:11px 14px;font-size:15px;font-weight:600;flex:1 1 auto;min-height:46px}
  button.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
  button.warn{background:#7c3aed;border-color:#7c3aed;color:#fff}
  button.ghost{background:transparent}
  button:disabled{opacity:.4}
  .toggle{display:flex;gap:6px}
  .toggle button.on{background:#22c55e;border-color:#22c55e;color:#042}
  #log{background:#0b0e18;border:1px solid var(--line);border-radius:12px;padding:8px 10px;font-size:12.5px;color:#cdd3ea;max-height:30vh;overflow:auto;white-space:pre-wrap}
  .end{text-align:center;padding:24px 10px}
  .end .big{font-size:30px;margin:8px}
  .hintbar{position:fixed;left:0;right:0;bottom:0;background:#111522ee;border-top:1px solid var(--line);padding:8px 12px;text-align:center;font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <div><b>Dragons of Etchinstone</b><div class="muted" id="sub">準備中…</div></div>
    <div class="muted" id="deckinfo"></div>
  </div>
  <details class="legendbox"><summary>圖例 / 說明</summary><div id="legend" class="chips"></div></details>
  <div id="main"></div>
  <h2>紀錄</h2>
  <div id="log"></div>
</div>
<div class="hintbar" id="hint">點卡片指派角色：第1下=法術、第2下=元素、第3下=Boost</div>

<script>
/* Dragons of Etchinstone — 規則引擎（JS 移植自 prototype.py / doe_data.py）
   可在瀏覽器與 node 使用。狀態機式 WebGame 供 UI 逐步操作。 */
(function (root) {
  "use strict";

  // ---------- 種子亂數 (mulberry32) ----------
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function shuffle(arr, rnd) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rnd() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  const ceilHalf = (x) => Math.floor((x + 1) / 2);

  // ---------- 工具 ----------
  function elementOf(set) {
    if (set.fusedElement) return set.fusedElement;
    return set.element ? set.element.cardElement : null;
  }
  function curLevel(card) { return card.levels[card.level]; }
  function pickAction(spell, elem) {
    const enh = curLevel(spell).enhanced;
    if (elem != null && enh.element != null && elem === enh.element)
      return [enh, "enhanced"];
    return [curLevel(spell).basic, "basic"];
  }
  function actionValue(action, kind) {
    return (action.type === kind || action.type === "both") ? action.value : 1;
  }
  function boostValue(set, init, hardships) {
    let b = set.boost ? curLevel(set.boost).boost : 0;
    if (hardships.includes("night_travel")) b = Math.max(0, b - init);
    return b;
  }

  // ---------- 結算：敵人 ----------
  function resolveEnemy(set, enemy, hardships, opts) {
    hardships = hardships || []; opts = opts || {};
    const log = [];
    let init = set.element ? curLevel(set.element).initiative : 0;
    const b = boostValue(set, init, hardships);
    const elem = elementOf(set);
    const [action, used] = pickAction(set.spell, elem);

    let atk = actionValue(action, "attack");
    let move = actionValue(action, "move");
    const isEnhAttack = (used === "enhanced" && (action.type === "attack" || action.type === "both"));
    const atkElem = isEnhAttack ? curLevel(set.spell).enhanced.element : null;

    if (set.boostTarget === "initiative") init += b;
    else if (set.boostTarget === "move") move += b;
    else atk += b;
    log.push(`先攻=${init}，攻擊=${atk}${isEnhAttack ? `（強化${atkElem}）` : `（${used}）`}`);

    if (isEnhAttack && enemy.armorElement && enemy.armorElement === atkElem) {
      atk = Math.max(0, atk - enemy.armorValue);
      log.push(`強化攻擊${atkElem} 匹配敵人護甲(${enemy.armorElement}${enemy.armorValue}) → 攻擊扣為 ${atk}`);
    }

    let cmp = atk;
    if (enemy.ability === "slow") {
      const useMove = (opts.slowUseMove != null) ? opts.slowUseMove : (move > atk);
      if (useMove) { cmp = move; log.push(`Slow：改用移動 ${move} 比 HP`); }
    }

    let early = 0, discardReserve = false;
    const ranged = enemy.ability === "ranged";
    const safe = init >= enemy.initiative;
    if (ranged && safe && opts.negateRanged) {
      discardReserve = true; log.push("Ranged：棄預備卡無視早期傷害");
    } else if (!safe || ranged) {
      early = enemy.attack;
      let why = (ranged && safe) ? "Ranged" : "敵人先攻較高";
      if (hardships.includes("ambush")) { early *= 2; why += "+Ambush翻倍"; }
      log.push(`早期傷害 ${early}（${why}）`);
    }

    let outcome, xp, combat;
    if (cmp >= enemy.hp) { outcome = "完全勝利"; xp = enemy.xp; combat = 0; }
    else if (cmp >= ceilHalf(enemy.hp)) { outcome = "險勝"; xp = enemy.xp; combat = enemy.attack; }
    else { outcome = "失敗"; xp = 0; combat = enemy.attack; }
    log.push(`值 ${cmp} vs HP ${enemy.hp}（門檻 ${ceilHalf(enemy.hp)}）→ ${outcome}`);

    if (enemy.ability === "freeze" && early > 0) { discardReserve = true; log.push("Freeze：清理階段須棄預備卡"); }

    let tp = 0;
    if (hardships.includes("hazards")) {
      tp = (early > 0 ? 1 : 0) + (combat > 0 ? 1 : 0);
      if (tp) log.push(`Hazards：+${tp} 時間懲罰`);
    }
    let poison = 0;
    if (enemy.ability === "poison" && (early > 0 || combat > 0)) {
      poison = (early > 0 && combat > 0) ? 2 : 1;
      log.push(`Poison：下一手牌追加 ${poison} 傷害`);
    }
    return { outcome, xp, timePenalty: tp, damageEarly: early, damageCombat: combat,
      attackElement: enemy.attackElement, discardReserve, poison, log };
  }

  // ---------- 結算：旅程 ----------
  function resolveJourney(set, journey, hardships, opts) {
    hardships = hardships || []; opts = opts || {};
    const log = [];
    let init = set.element ? curLevel(set.element).initiative : 0;
    const b = boostValue(set, init, hardships);
    const elem = elementOf(set);
    const [action, used] = pickAction(set.spell, elem);

    let mv = actionValue(action, "move") + b;
    const isEnhMove = (used === "enhanced" && (action.type === "move" || action.type === "both"));
    const reserveBoost = opts.reserve ? curLevel(opts.reserve).boost : 0;
    if (isEnhMove && curLevel(set.spell).enhanced.element === journey.mpElement && reserveBoost) {
      mv += reserveBoost; log.push(`強化移動元素匹配 MP → 加預備卡 Boost +${reserveBoost}`);
    }
    let mp = journey.mp;
    if (journey.peril === "steep" && reserveBoost) { mp += reserveBoost; log.push(`Steep：MP +預備Boost${reserveBoost} → ${mp}`); }

    log.push(`移動 ${mv} vs MP ${mp}（門檻 ${ceilHalf(mp)}）`);
    let outcome, xp, tp;
    if (mv >= mp) { outcome = "完全勝利"; xp = journey.xp; tp = 0; }
    else if (mv >= ceilHalf(mp)) { outcome = "險勝"; xp = journey.xp; tp = journey.timePenalty; }
    else { outcome = "失敗"; xp = 0; tp = journey.timePenalty; }
    log.push(`→ ${outcome}`);
    let dmg = 0;
    if (journey.peril === "treacherous" && outcome !== "完全勝利") { dmg += 1; log.push("Treacherous：未完全勝利 → 時間懲罰後再受 1 傷害"); }
    return { outcome, xp, timePenalty: tp, damageOther: dmg, attackElement: null, log };
  }

  // ---------- 懲罰：兩條帳 ----------
  function soakDamage(hand, total, attackElement, order, log) {
    if (total <= 0) return false;
    const idxs = order || hand.map((_, i) => i);
    let remaining = total; const done = new Set();
    for (const i of idxs) {
      if (remaining <= 0) break;
      if (done.has(i) || i >= hand.length) continue;
      const card = hand[i]; const lv = curLevel(card);
      let soak = lv.armorValue;
      const doubled = !!(lv.armorElement && attackElement && lv.armorElement === attackElement);
      if (doubled) soak *= 2;
      remaining -= soak; done.add(i);
      if (card.level === 1) { log.push(`${card.name} 吸收 ${soak}${doubled ? "(雙倍)" : ""} → 銷毀`); card.level = 0; }
      else { card.level -= 1; log.push(`${card.name} 吸收 ${soak}${doubled ? "(雙倍)" : ""} → 降到 L${card.level}`); }
    }
    // 移除銷毀
    for (let i = hand.length - 1; i >= 0; i--) if (hand[i].level === 0) hand.splice(i, 1);
    if (remaining > 0) { log.push(`剩餘 ${remaining} 傷害無法吸收 → KO`); return true; }
    return false;
  }
  function resolvePenalty(deck, hand, timePenalty, damage, attackElement, opts) {
    opts = opts || {}; const log = [];
    const discardN = Math.min(timePenalty, deck.length);
    deck.splice(0, discardN);
    const shortfall = timePenalty - discardN;
    if (timePenalty) log.push(`時間懲罰 ${timePenalty}：棄牌庫頂 ${discardN} 張${shortfall ? `，牌不夠 → ${shortfall} 轉成傷害` : ""}`);
    let total = damage + shortfall;
    if (opts.storm && timePenalty > 0) { total += timePenalty; log.push(`Storm：時間懲罰 ${timePenalty} → 額外 ${timePenalty} 傷害`); }
    log.push(`傷害總額 = ${total}（攻擊元素 ${attackElement}）`);
    const ko = soakDamage(hand, total, attackElement, opts.order, log);
    if (ko && !opts.finalBattle) { log.push("被擊倒(KO)：尚未降級的卡全降級，棄牌庫頂 4 張，繼續"); deck.splice(0, Math.min(4, deck.length)); }
    return { knockedOut: ko, log, totalDamage: total };
  }

  function doUpgrade(hand, xp, picks) {
    const log = [`可用 XP = ${xp}`];
    for (const i of picks) {
      const card = hand[i]; if (!card) continue;
      if (card.level >= 4) { log.push(`${card.name} 已滿級`); continue; }
      const cost = curLevel(card).upgradeCost;
      if (xp >= cost) { xp -= cost; card.level += 1; log.push(`花 ${cost} XP 升級 ${card.name} → L${card.level}（剩 ${xp}）`); }
      else log.push(`XP 不足升級 ${card.name}（需 ${cost}，剩 ${xp}）`);
    }
    log.push(`剩餘 XP ${xp} 清空`);
    return log;
  }

  // ---------- 最終戰 ----------
  function resolveFinalJourney(sets, dragon, reserve) {
    const log = []; let totalMove = 0;
    const reserveBoost = reserve ? curLevel(reserve).boost : 0;
    const mpElems = new Set(dragon.mpTiers.map(t => t[1]).filter(Boolean));
    let usedReserve = false;
    for (const s of sets) {
      const elem = elementOf(s);
      const [action, used] = pickAction(s.spell, elem);
      let mv = actionValue(action, "move") + (s.boost ? curLevel(s.boost).boost : 0);
      const isEnhMove = (used === "enhanced" && (action.type === "move" || action.type === "both"));
      if (!usedReserve && isEnhMove && reserveBoost && mpElems.has(curLevel(s.spell).enhanced.element)) {
        mv += reserveBoost; usedReserve = true; log.push(`強化移動匹配 MP 元素 → 加預備卡 Boost +${reserveBoost}（限一次）`);
      }
      totalMove += mv; log.push(`行動組：移動 ${mv}（${used}）`);
    }
    log.push(`總移動 = ${totalMove}`);
    const first = dragon.mpTiers[0][0];
    if (totalMove < first) { log.push(`總移動 ${totalMove} < 第一檔 MP ${first} → 立即輸掉`); return { lose: true, timePenalty: 0, log }; }
    let tp = 0;
    for (const [mp, , pen] of dragon.mpTiers) if (totalMove >= mp) tp = pen;
    log.push(`達到對應 MP 檔 → 時間懲罰 ${tp}`);
    return { lose: false, timePenalty: tp, log };
  }
  function resolveFinalEnemy(sets, dragon) {
    const log = []; let totalAtk = 0, totalInit = 0; const enhElems = new Set();
    for (const s of sets) {
      const elem = elementOf(s);
      const [action, used] = pickAction(s.spell, elem);
      let atk = actionValue(action, "attack");
      let init = s.element ? curLevel(s.element).initiative : 0;
      const b = s.boost ? curLevel(s.boost).boost : 0;
      if (s.boostTarget === "initiative") init += b; else atk += b;
      totalAtk += atk; totalInit += init;
      if (used === "enhanced" && (action.type === "attack" || action.type === "both")) enhElems.add(curLevel(s.spell).enhanced.element);
      log.push(`行動組：攻擊 ${atk}、先攻 ${init}（${used}）`);
    }
    log.push(`總攻擊 = ${totalAtk}，總先攻 = ${totalInit}`);
    let early = 0;
    if (totalInit < dragon.initiative) { early = dragon.earlyDamage.value; log.push(`總先攻 < 龍先攻 ${dragon.initiative} → 早期傷害 ${early}（${dragon.earlyDamage.element}）`); }
    for (const ar of dragon.armor) if (enhElems.has(ar.element)) { totalAtk = Math.max(0, totalAtk - ar.value); log.push(`龍護甲 ${ar.element}${ar.value} 匹配強化攻擊 → 總攻擊 ${totalAtk}`); }
    const first = dragon.hpTiers[0][0];
    if (totalAtk < first) { log.push(`總攻擊 ${totalAtk} < 第一檔 HP ${first} → 立即輸掉`); return { lose: true, log }; }
    let combat = null, combatElem = null;
    for (const [hp, hit] of dragon.hpTiers) if (totalAtk >= hp) { combat = hit.value; combatElem = hit.element; }
    const totalDamage = early + combat;
    log.push(`達 HP 檔 → 戰鬥傷害 ${combat}（${combatElem}）；龍總傷害 ${early}+${combat}=${totalDamage}`);
    return { lose: false, totalDamage, damageElement: combatElem, log };
  }

  root.DOEEngine = {
    mulberry32, shuffle, ceilHalf, curLevel, pickAction, actionValue, elementOf,
    resolveEnemy, resolveJourney, resolvePenalty, soakDamage, doUpgrade,
    resolveFinalJourney, resolveFinalEnemy,
  };
  if (typeof module !== "undefined" && module.exports) module.exports = root.DOEEngine;
})(typeof window !== "undefined" ? window : globalThis);

</script>
<script>
/* Dragons of Etchinstone — 資料 + WebGame 狀態機（移植自 doe_data.py / doe_game.py）。
   瀏覽器與 node 皆可用。 */
(function (root) {
  "use strict";
  const E = (typeof module !== "undefined" && module.exports) ? require("./engine.js") : root.DOEEngine;
  const { mulberry32, shuffle, curLevel, resolveEnemy, resolveJourney, resolvePenalty,
    doUpgrade, resolveFinalJourney, resolveFinalEnemy } = E;
  const ELEMS = ["water", "fire", "lightning", "shadow"];

  // ---------- 資料 ----------
  function mkLevel(L, o) {
    return {
      level: L, encounterIcon: o.ei, encounterValue: o.ev, hardship: o.hard,
      initiative: o.init,
      basic: { type: o.bType, value: o.bVal },
      enhanced: { type: o.eType, value: o.eVal, element: o.eElem },
      boost: o.boost, armorValue: o.armor, armorElement: o.armorEl, upgradeCost: o.cost,
    };
  }
  function mkCard(name, elem, kind, armorEl) {
    const levels = {};
    for (const L of [1, 2, 3, 4]) {
      let bType, eType;
      if (kind === "attacker") { bType = "attack"; eType = "attack"; }
      else if (kind === "mover") { bType = "move"; eType = "move"; }
      else { bType = "attack"; eType = "move"; }
      levels[L] = mkLevel(L, {
        bType, bVal: 1 + L, eType, eVal: 3 + 3 * L, eElem: elem,
        init: (elem === "water" || elem === "lightning") ? L + 2 : L,
        boost: (elem === "shadow") ? L + 2 : L,
        armor: (elem === "water") ? L + 2 : L + 1,
        armorEl, cost: (elem === "lightning") ? L + 2 : L + 1,
        ei: (L % 2 === 0) ? "enemy" : "journey", ev: ((L - 1) % 4) + 1,
        hard: (L === 4) ? "hazards" : null,
      });
    }
    return { name, cardElement: elem, level: 2, levels };
  }
  function buildMageCards() {
    const specs = [
      ["Brute Force", "water", "attacker", "fire"],
      ["Tidal Guard", "water", "attacker", "water"],
      ["Frostfire Wall", "water", "flex", "fire"],
      ["Ice Wall", "water", "mover", "water"],
      ["Rain of Blood", "fire", "attacker", null],
      ["Burning Bridges", "fire", "attacker", "fire"],
      ["Ember Dash", "fire", "mover", null],
      ["Motivated Flight", "fire", "mover", "fire"],
      ["River Swiftness", "lightning", "mover", null],
      ["Fleet Footed", "lightning", "mover", "lightning"],
      ["Storm Lance", "lightning", "attacker", null],
      ["Determined March", "lightning", "mover", "lightning"],
      ["Adapt", "shadow", "flex", null],
      ["Distraction", "shadow", "flex", "shadow"],
      ["Sword of Light", "shadow", "attacker", null],
      ["Shadowstep", "shadow", "mover", "shadow"],
    ];
    return specs.map(s => mkCard(s[0], s[1], s[2], s[3]));
  }
  function buildRegions() {
    const names = { 1: "Jade Mountains", 2: "Living Marsh", 3: "Burning Basin", 4: "Forest of Gath" };
    const abil = [null, null, "ranged", "freeze"];
    const peril = [null, null, "treacherous", "steep"];
    const regions = {};
    for (const r of [1, 2, 3, 4]) {
      const base = r, enemies = [], journeys = [];
      for (let i = 1; i <= 4; i++) enemies.push({
        name: `${names[r]} Enemy ${i}`, hp: 5 + base * 2 + i, initiative: 1 + (i % 3),
        attack: 2 + base, attackElement: ELEMS[(r + i) % 4],
        armorValue: i >= 3 ? 1 : 0, armorElement: i >= 3 ? ELEMS[(r + i) % 4] : null,
        xp: 2 + base + (i === 4 ? 1 : 0), ability: abil[i - 1],
      });
      for (let i = 1; i <= 4; i++) journeys.push({
        name: `${names[r]} Journey ${i}`, mp: 5 + base * 2 + i, mpElement: ELEMS[(r + i + 1) % 4],
        timePenalty: 1 + (i % 3), xp: 2 + base, peril: peril[i - 1],
      });
      regions[r] = { name: names[r], enemies, journeys };
    }
    return regions;
  }
  function buildDragons() {
    const H = (v, e) => ({ value: v, element: e });
    return {
      "DOE-D01": { name: "Rodving (The Last Breath)", initiative: 9, earlyDamage: H(9, "fire"),
        armor: [H(4, "fire")], mpTiers: [[20, "lightning", 3], [23, "lightning", 2], [28, "lightning", 1]],
        hpTiers: [[22, H(27, "fire")], [27, H(24, "fire")], [32, H(15, "fire")]] },
      "DOE-D02": { name: "Vuurhast", initiative: 8, earlyDamage: H(7, "water"),
        armor: [H(3, "water")], mpTiers: [[18, "water", 3], [22, "water", 2], [26, "water", 1]],
        hpTiers: [[20, H(24, "water")], [25, H(20, "water")], [30, H(12, "water")]] },
    };
  }

  // ---------- 角色組合輔助 ----------
  function buildSet(hand, s, e, b, t, fused) {
    return { spell: hand[s], element: e != null ? hand[e] : null,
      boost: b != null ? hand[b] : null, boostTarget: t, fusedElement: fused || null };
  }
  function* enumAssign(n, encType) {
    const targets = encType === "enemy" ? ["attack", "initiative"] : ["move"];
    if (n >= 3) {
      for (let s = 0; s < n; s++) for (let e = 0; e < n; e++) {
        if (e === s) continue;
        for (let b = 0; b < n; b++) { if (b === s || b === e) continue; for (const t of targets) yield [s, e, b, t]; }
      }
    } else if (n === 2) { for (let s = 0; s < 2; s++) { const e = 1 - s; for (const t of targets) yield [s, e, null, t]; } }
    else if (n === 1) { for (const t of targets) yield [0, null, null, t]; }
  }
  const RANK = { "完全勝利": 2, "險勝": 1, "失敗": 0 };
  function bestAssignment(hand, encType, target) {
    let best = null;
    for (const [s, e, b, t] of enumAssign(hand.length, encType)) {
      const set = buildSet(hand, s, e, b, t);
      let r, dmg;
      if (encType === "enemy") { r = resolveEnemy(set, target, []); dmg = r.damageEarly + r.damageCombat; }
      else { r = resolveJourney(set, target, []); dmg = r.damageOther; }
      const score = [RANK[r.outcome], r.xp, -dmg, -r.timePenalty];
      if (!best || cmpArr(score, best.score) > 0) best = { score, pick: [s, e, b, t] };
    }
    return best.pick;
  }
  function cmpArr(a, b) { for (let i = 0; i < a.length; i++) { if (a[i] !== b[i]) return a[i] - b[i]; } return 0; }
  function orderDowngrades(hand) {
    return hand.map((_, i) => i).sort((x, y) => {
      const a = curLevel(hand[x]), b = curLevel(hand[y]);
      return (b.armorValue - a.armorValue) || (hand[y].level - hand[x].level);
    });
  }
  function chooseUpgrades(hand, xp) {
    const picks = []; let budget = xp; const lv = hand.map(c => c.level);
    while (true) {
      let cand = null;
      for (let i = 0; i < hand.length; i++) {
        if (lv[i] >= 4) continue;
        const cost = hand[i].levels[lv[i]].upgradeCost;
        if (cost <= budget && (!cand || cost < cand.cost)) cand = { cost, i };
      }
      if (!cand) break;
      picks.push(cand.i); budget -= cand.cost; lv[cand.i] += 1;
    }
    return picks;
  }
  function makeTwoSets(hand, kind) {
    const val = (c) => {
      const b = curLevel(c).basic, e = curLevel(c).enhanced; let vs = [1];
      if (b.type === kind) vs.push(b.value); if (e.type === kind) vs.push(e.value);
      return Math.max(...vs);
    };
    const used = new Set(), sets = [];
    const t = kind === "attack" ? "attack" : "move";
    for (let k = 0; k < 2; k++) {
      let avail = hand.map((_, i) => i).filter(i => !used.has(i));
      if (!avail.length) break;
      let s = avail.reduce((a, b) => val(hand[b]) > val(hand[a]) ? b : a, avail[0]);
      used.add(s);
      const enh = curLevel(hand[s]).enhanced;
      avail = hand.map((_, i) => i).filter(i => !used.has(i));
      let elem = null;
      if (enh.type === kind && enh.element) {
        const match = avail.filter(i => hand[i].cardElement === enh.element);
        if (match.length) elem = match.reduce((a, b) => curLevel(hand[b]).initiative > curLevel(hand[a]).initiative ? b : a, match[0]);
      }
      if (elem == null && avail.length) elem = avail.reduce((a, b) => curLevel(hand[b]).initiative > curLevel(hand[a]).initiative ? b : a, avail[0]);
      if (elem != null) used.add(elem);
      avail = hand.map((_, i) => i).filter(i => !used.has(i));
      let bo = avail.length ? avail.reduce((a, b) => curLevel(hand[b]).boost > curLevel(hand[a]).boost ? b : a, avail[0]) : null;
      if (bo != null) used.add(bo);
      sets.push({ spell: hand[s], element: elem != null ? hand[elem] : null, boost: bo != null ? hand[bo] : null, boostTarget: t, fusedElement: null });
    }
    return sets;
  }

  // ---------- WebGame 狀態機 ----------
  class WebGame {
    constructor(seed, dragonId) {
      this.rnd = mulberry32((seed >>> 0) || 1);
      this.allCards = buildMageCards();
      this.regions = buildRegions();
      this.dragon = buildDragons()[dragonId || "DOE-D01"];
      this.deck = []; this.hand = []; this.discard = [];
      this.regionIdx = 1; this.pendingPoison = 0;
      this.phase = "init"; this.log = []; this.tx = null;
      this.result = null; // {win, score}
    }
    out(msg) { this.log.push(msg); }
    aliveCards() { return this.allCards.filter(c => c.level >= 1); }
    reshuffleAll() { this.deck = shuffle(this.aliveCards(), this.rnd); this.hand = []; this.discard = []; }
    drawTo(n) { while (this.hand.length < n && this.deck.length) this.hand.push(this.deck.shift()); }

    start() {
      for (const c of this.allCards) c.level = 2;
      this.reshuffleAll(); this.drawTo(4); this.regionIdx = 1;
      this.out(`對手龍：${this.dragon.name}`);
      this._beginEncounter();
      return this;
    }
    _beginEncounter() {
      if (this.regionIdx > 4) { this._startFinal(); return; }
      if (!this.deck.length) { this._endRegion(); return; }
      this.divertsLeft = 2;
      this._scout();
    }
    _scout() {
      const key = this.deck[0], klv = curLevel(key);
      const encType = klv.encounterIcon, idx = klv.encounterValue - 1;
      const reg = this.regions[this.regionIdx];
      const target = encType === "enemy" ? reg.enemies[idx] : reg.journeys[idx];
      const hardships = klv.hardship ? [klv.hardship] : [];
      this.enc = { key, encType, target, hardships };
      this.phase = "challenge";
    }
    divert(handIdx) {
      if (this.divertsLeft <= 0 || !this.hand.length) return false;
      const drop = this.hand.splice(handIdx, 1)[0];
      this.discard.push(drop, this.deck.shift());
      this.divertsLeft -= 1;
      this.out(`繞道：棄 ${drop.name} 與關鍵卡`);
      if (!this.deck.length) { this._endRegion(); return true; }
      this._scout(); return true;
    }
    toAction() { this.phase = "action"; }

    // assignment: {s, e, b, t, fusedElement, consumedIdx, negateRanged, slowUseMove}
    resolveAction(a) {
      const enc = this.enc;
      const set = buildSet(this.hand, a.s, a.e, a.b, a.t, a.fusedElement);
      const roleIdx = new Set([a.s, a.e, a.b].filter(x => x != null));
      let reserveIdx = null;
      for (let i = 0; i < this.hand.length; i++) if (!roleIdx.has(i)) { reserveIdx = i; break; }
      let reserveCard = reserveIdx != null ? this.hand[reserveIdx] : null;
      let consumedCard = null;
      if (a.consumedIdx != null) { consumedCard = this.hand[a.consumedIdx]; if (a.consumedIdx === reserveIdx) reserveCard = null; }
      const roleCards = [a.s, a.e, a.b].filter(x => x != null).map(i => this.hand[i]);
      if (consumedCard) roleCards.push(consumedCard);

      let r, dmg, atkEl;
      if (enc.encType === "enemy") {
        r = resolveEnemy(set, enc.target, enc.hardships, { negateRanged: a.negateRanged, slowUseMove: a.slowUseMove });
        dmg = r.damageEarly + r.damageCombat; atkEl = r.attackElement;
      } else {
        r = resolveJourney(set, enc.target, enc.hardships, { reserve: reserveCard });
        dmg = r.damageOther; atkEl = null;
      }
      r.log.forEach(l => this.out(l));
      this.out(`結果：${r.outcome}｜XP ${r.xp}｜時間懲罰 ${r.timePenalty}｜傷害 ${dmg}`);
      this.tx = { r, dmg, atkEl, roleCards, reserveCard, set, needDiscardReserve: r.discardReserve };
      this.phase = "penalty";
      return r;
    }
    // 懲罰：order=要降級的手牌索引順序（可空→自動）
    applyPenalty(order) {
      const { r, dmg, atkEl } = this.tx;
      const ord = order || orderDowngrades(this.hand);
      const pen = resolvePenalty(this.deck, this.hand, r.timePenalty, dmg, atkEl,
        { storm: this.enc.hardships.includes("storm"), order: ord });
      pen.log.forEach(l => this.out(l));
      this.tx.ko = pen.knockedOut;
      this.phase = "upgrade";
      return pen;
    }
    applyUpgrade(picks) {
      const { r } = this.tx;
      if (r.xp > 0 && this.hand.length) doUpgrade(this.hand, r.xp, (picks || []).filter(p => p < this.hand.length)).forEach(l => this.out(l));
      this._cleanup();
    }
    _cleanup() {
      const tx = this.tx;
      for (const c of tx.roleCards) { const i = this.hand.indexOf(c); if (i >= 0) { this.hand.splice(i, 1); this.discard.push(c); } }
      if (tx.needDiscardReserve && tx.reserveCard) { const i = this.hand.indexOf(tx.reserveCard); if (i >= 0) { this.hand.splice(i, 1); this.discard.push(tx.reserveCard); this.out("清理：棄掉預備卡（Freeze/Ranged）"); } }
      this.drawTo(4);
      if (tx.r.poison && this.hand.length) this.pendingPoison += tx.r.poison;
      if (this.pendingPoison && this.hand.length) {
        this.out(`Poison：新手牌追加 ${this.pendingPoison} 傷害`);
        resolvePenalty(this.deck, this.hand, 0, this.pendingPoison, null, { order: orderDowngrades(this.hand) }).log.forEach(l => this.out(l));
        this.pendingPoison = 0;
      }
      this.tx = null;
      if (this.deck.length + this.hand.length < 5) { this._endRegion(); return; }
      this._beginEncounter();
    }
    _endRegion() {
      if (this.regionIdx >= 4) { this._startFinal(); return; }
      this.out(`▷ 地區 ${this.regionIdx} 結束，重洗進入下一區`);
      this.regionIdx += 1; this.reshuffleAll(); this.drawTo(4);
      this._beginEncounter();
    }

    // ---------- 最終戰 ----------
    _startFinal() {
      this.out("—— 最終戰 ——");
      this.reshuffleAll(); this.drawTo(7);
      this.phase = "final_journey_intro";
    }
    // regroupIdx: 要棄的手牌索引 或 null（不 regroup）
    finalJourney(regroupIdx) {
      if (regroupIdx != null && this.hand.length) {
        const dropped = this.hand.splice(regroupIdx, 1)[0];
        this.discard.push(dropped); shuffle(this.hand, this.rnd);
        this.deck = this.deck.concat(this.hand); this.hand = []; this.drawTo(7);
        this.out(`Regroup：棄 ${dropped.name}，重抽 7 張`);
      }
      const usedN = Math.min(6, this.hand.length);
      const reserve = this.hand.length > usedN ? this.hand[usedN] : null;
      const sets = makeTwoSets(this.hand, "move");
      const fj = resolveFinalJourney(sets, this.dragon, reserve);
      fj.log.forEach(l => this.out(l));
      if (fj.lose) { this._finish(false); return fj; }
      if (fj.timePenalty) {
        const pen = resolvePenalty(this.deck, this.hand, fj.timePenalty, 0, null, {});
        pen.log.forEach(l => this.out(l));
        if (pen.knockedOut) { this._finish(false); return fj; }
      }
      this.discard = this.discard.concat(this.hand); this.hand = []; // Rest
      this.hand = this.deck.slice(); this.deck = [];
      this.phase = "final_enemy_intro";
      this.out(`最終敵人：抽光剩餘 ${this.hand.length} 張`);
      return fj;
    }
    finalEnemy() {
      if (!this.hand.length) { this._finish(false); return null; }
      const sets = makeTwoSets(this.hand, "attack");
      const fe = resolveFinalEnemy(sets, this.dragon);
      fe.log.forEach(l => this.out(l));
      if (fe.lose) { this._finish(false); return fe; }
      const pen = resolvePenalty(this.deck, this.hand, 0, fe.totalDamage, fe.damageElement,
        { order: orderDowngrades(this.hand), finalBattle: true });
      pen.log.forEach(l => this.out(l));
      this._finish(!pen.knockedOut);
      return fe;
    }
    _finish(win) {
      const score = win ? this.aliveCards().reduce((s, c) => s + c.level, 0) : 0;
      this.result = { win, score };
      this.phase = "gameover";
      this.out(win ? `🏆 勝利！分數 = ${score}` : "💀 失敗，分數 0");
    }
  }

  root.DOEData = { buildMageCards, buildRegions, buildDragons };
  root.DOEGame = { WebGame, bestAssignment, orderDowngrades, chooseUpgrades, makeTwoSets, buildSet };
  if (typeof module !== "undefined" && module.exports) module.exports = { WebGame, bestAssignment, orderDowngrades, chooseUpgrades, makeTwoSets, buildSet, buildMageCards, buildRegions, buildDragons };
})(typeof window !== "undefined" ? window : globalThis);

</script>
<script>
window.onerror=function(msg,src,line,col){
  var s=document.getElementById('sub'); if(s)s.textContent='發生錯誤';
  var m=document.getElementById('main'); if(m)m.innerHTML='<div class="banner">JS 錯誤：'+msg+' （'+line+':'+col+'）</div>';
  return false;
};
const EL={water:"w",fire:"f",lightning:"l",shadow:"s"};
const ELC={water:"#3b82f6",fire:"#ef4444",lightning:"#eab308",shadow:"#a78bfa"};
const elc=(e)=>ELC[e]||"#cbd5e1";
// SVG 圖示（24x24 path）：元素/動作/防具…，顏色代表屬性
const PATHS={
  water:"M12 3c4 5 6 8 6 11a6 6 0 0 1-12 0c0-3 2-6 6-11z",
  fire:"M13 2c.4 4 4 5 4 9a5 5 0 0 1-10 0c0-2.2 1.3-3.4 2.2-4 .1 1 .7 1.7 1.3 2C9.5 6.5 11 4 13 2z",
  lightning:"M13 2L4 14h6l-2 8 10-13h-7l2-7z",
  shadow:"M15.5 2A9 9 0 1 0 20 15 7.5 7.5 0 0 1 15.5 2z",
  sword:"M11 2h2v11h-2zM8 13h8v2H8zM11 15h2v6h-2z",
  boot:"M8 3h3v9h3.5c2.2 0 4.5 1.4 4.5 4v2a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1V3z",
  shield:"M12 2l8 3v6c0 5-3.4 9-8 11-4.6-2-8-6-8-11V5l8-3z",
  boost:"M12 3l7 8h-4v8h-6v-8H5z",
  init:"M4 5l7 7-7 7zM12 5l7 7-7 7z",
  upgrade:"M12 3l6 7h-4v5h-4v-5H6zM7 18h10v2H7z",
  hourglass:"M6 2h12v3.5L13 10l5 4.5V18H6v-3.5L11 10 6 5.5z",
  heart:"M12 21C6 16 3 12.5 3 8.5A4.5 4.5 0 0 1 12 6a4.5 4.5 0 0 1 9 2.5C21 12.5 18 16 12 21z",
  mountain:"M2 19l6-11 4 6 2.5-4L22 19z",
  star:"M12 2l2.9 6 6.1.9-4.5 4.2 1.1 6.1L12 16.4 6.4 19.2l1.1-6.1L3 8.9 9.1 8z",
  skull:"M12 2a8 8 0 0 0-8 8c0 2.4 1.4 3.9 2.4 5v3h2v-2h1v2h1v-2h1v2h2v-3c1-1.1 2.6-2.6 2.6-5a8 8 0 0 0-8-8zM9 9a1.6 1.6 0 1 1 0 3.2A1.6 1.6 0 0 1 9 9zm6 0a1.6 1.6 0 1 1 0 3.2A1.6 1.6 0 0 1 15 9z",
};
function ic(name,color,size){size=size||14;return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="${color||'#cbd5e1'}" aria-hidden="true"><path d="${PATHS[name]}"/></svg>`;}
function chip(name,color,num){return `<span class="chip">${ic(name,color)}${num!=null?`<b>${num}</b>`:""}</span>`;}
function actName(t){return t==="move"?"boot":"sword";}        // attack→劍, move→靴
function actChip(action,color){
  if(action.type==="both") return `<span class="chip">${ic("sword",color)}${ic("boot",color)}<b>${action.value}</b></span>`;
  return chip(actName(action.type),color,action.value);
}
let g, ui;

function buildLegend(){
  const el=document.getElementById("legend"); if(!el) return;
  const L=[
    chip("init","#cbd5e1")+"先攻", actChip({type:"attack",value:""},"#cbd5e1")+"攻擊",
    actChip({type:"move",value:""},"#cbd5e1")+"移動", chip("boost","#cbd5e1")+"Boost",
    chip("shield","#cbd5e1")+"護甲", chip("upgrade","#cbd5e1")+"升級花費",
    chip("heart","#fca5a5")+"HP", chip("mountain","#93c5fd")+"MP",
    chip("hourglass","#cbd5e1")+"時間懲罰", chip("star","#fcd34d")+"XP",
    "顏色＝屬性：", ic("water",elc("water"),16)+"水", ic("fire",elc("fire"),16)+"火",
    ic("lightning",elc("lightning"),16)+"雷", ic("shadow",elc("shadow"),16)+"暗",
  ];
  el.innerHTML=L.map(s=>`<span class="chip">${s}</span>`).join("");
}
function newGame(seed){
  g=new DOEGame.WebGame(seed||((Math.random()*1e9)|0),"DOE-D01");
  g.start();
  ui={sel:{s:null,e:null,b:null},bt:"attack",dpicks:[],upicks:[],logLen:0};
  buildLegend();
  render();
}
function cur(c){return c.levels[c.level];}
function cardHTML(c,i,opts){
  opts=opts||{};
  const lv=cur(c); const cls=EL[c.cardElement];
  let badge="";
  if(opts.role) badge=`<span class="badge b-${opts.role}">${{s:"法",e:"元",b:"B",r:"預",c:"消"}[opts.role]}</span>`;
  const sel=opts.sel?"sel":"";
  const armColor=lv.armorElement?elc(lv.armorElement):"#cbd5e1";
  return `<div class="card ${cls} ${sel}" data-i="${i}">
    ${badge}<span class="lv">L${c.level}</span>
    <div class="nm">${ic(c.cardElement,elc(c.cardElement),16)} ${c.name}</div>
    <div class="chips">
      ${chip("init","#cbd5e1",lv.initiative)}
      ${actChip(lv.basic,"#cbd5e1")}
      ${actChip(lv.enhanced,elc(lv.enhanced.element))}
      ${chip("boost","#cbd5e1",lv.boost)}
      ${chip("shield",armColor,lv.armorValue)}
      ${chip("upgrade","#cbd5e1",lv.upgradeCost)}
    </div>
  </div>`;
}
function handHTML(roleOf){
  return `<div class="row">`+g.hand.map((c,i)=>cardHTML(c,i,{role:roleOf?roleOf(i):null,sel:roleOf?false:isSel(i)})).join("")+`</div>`;
}
function isSel(i){return i===ui.sel.s||i===ui.sel.e||i===ui.sel.b;}
function roleOfIdx(i){if(i===ui.sel.s)return"s";if(i===ui.sel.e)return"e";if(i===ui.sel.b)return"b";return null;}

function encHTML(){
  const e=g.enc, t=e.target;
  if(e.encType==="enemy"){
    const armC=t.armorElement?elc(t.armorElement):"#cbd5e1";
    return `<div class="enc"><div class="nm">${ic("skull","#fca5a5",18)} 敵人：${t.name}</div>
      <div class="chips big">
        ${chip("heart","#fca5a5",t.hp)}
        ${chip("init","#cbd5e1",t.initiative)}
        ${chip("sword",elc(t.attackElement),t.attack)}
        ${t.armorValue?chip("shield",armC,t.armorValue):""}
        ${chip("star","#fcd34d",t.xp)}
      </div>
      ${t.ability?`<div class="muted">能力：${t.ability}</div>`:""}
      ${e.hardships.length?`<div class="muted">苦難：${e.hardships.join(",")}</div>`:""}</div>`;
  }
  return `<div class="enc"><div class="nm">${ic("mountain","#93c5fd",18)} 旅程：${t.name}</div>
    <div class="chips big">
      ${chip("mountain",elc(t.mpElement),t.mp)}
      ${chip("hourglass","#cbd5e1",t.timePenalty)}
      ${chip("star","#fcd34d",t.xp)}
    </div>
    ${t.peril?`<div class="muted">危險：${t.peril}</div>`:""}
    ${e.hardships.length?`<div class="muted">苦難：${e.hardships.join(",")}</div>`:""}</div>`;
}

function render(){
  document.getElementById("sub").textContent =
    g.phase==="gameover"?"結束":`地區 ${g.regionIdx>4?4:g.regionIdx} · ${phaseName()}`;
  document.getElementById("deckinfo").innerHTML = `牌庫 ${g.deck.length}<br>手牌 ${g.hand.length}`;
  const m=document.getElementById("main");
  m.innerHTML = viewFor();
  // log
  const lg=document.getElementById("log");
  lg.textContent = g.log.slice(-40).join("\n");
  lg.scrollTop = lg.scrollHeight;
  bindCards();
  setHint();
}
function phaseName(){return {challenge:"挑戰",action:"行動",penalty:"懲罰",upgrade:"升級",
  final_journey_intro:"最終旅程",final_enemy_intro:"最終敵人",gameover:"結束"}[g.phase]||g.phase;}

function viewFor(){
  switch(g.phase){
    case "challenge": return encHTML()+`<div class="btns">
        <button class="primary" onclick="act('面對')">面對</button>
        <button class="ghost" onclick="startDivert()" ${g.divertsLeft>0?"":"disabled"}>繞道 (${g.divertsLeft})</button>
      </div>`+(ui.diverting?`<h2>選一張手牌一起棄掉</h2>`+handHTML():"");
    case "action": {
      const enemy=g.enc.encType==="enemy";
      return encHTML()+`<h2>指派角色（法/元/B），其餘為預備</h2>`+handHTML(roleOfIdx)+
        `<div class="btns">${enemy?`<div class="toggle">
            <button class="${ui.bt==='attack'?'on':''}" onclick="ui.bt='attack';render()">Boost→攻擊</button>
            <button class="${ui.bt==='initiative'?'on':''}" onclick="ui.bt='initiative';render()">Boost→先攻</button>
          </div>`:""}</div>
        <div class="btns">
          <button class="ghost" onclick="suggest()">建議</button>
          <button class="ghost" onclick="ui.sel={s:null,e:null,b:null};render()">清除</button>
          <button class="primary" onclick="confirmAction()" ${ui.sel.s!=null?"":"disabled"}>確定行動</button>
        </div>`;
    }
    case "penalty": {
      const r=g.tx.r;
      return `<div class="banner">結算：<b>${r.outcome}</b>　XP ${r.xp}　時間懲罰 ${r.timePenalty}　傷害 ${g.tx.dmg}</div>
        ${(g.tx.dmg>0||r.timePenalty>0)?`<div class="muted">懲罰階段：時間懲罰先棄牌，傷害用降級手牌吸收。</div>`:""}
        <div class="btns"><button class="primary" onclick="doPenalty()">結算懲罰</button></div>`;
    }
    case "upgrade": {
      const xp=g.tx.r.xp;
      if(xp<=0) return `<div class="banner">沒有 XP，直接清理。</div>
        <div class="btns"><button class="primary" onclick="g.applyUpgrade([]);afterTurn()">繼續</button></div>`;
      return `<div class="banner">升級階段：可用 XP <b>${xp}</b></div>`+handHTML()+
        `<div class="muted">已選升級：${ui.upicks.map(i=>g.hand[i]?g.hand[i].name:'?').join("、")||"無"}</div>
        <div class="btns">
          <button class="ghost" onclick="suggestUpgrade()">建議</button>
          <button class="ghost" onclick="ui.upicks=[];render()">清除</button>
          <button class="primary" onclick="g.applyUpgrade(ui.upicks);afterTurn()">完成升級</button>
        </div>`;
    }
    case "final_journey_intro":
      return dragonHTML()+`<h2>最終旅程：手牌 7 張（系統自動配置兩組行動）</h2>`+handHTML()+
        `<div class="btns">
           <button class="warn" onclick="startRegroup()">Regroup 棄1重抽</button>
           <button class="primary" onclick="g.finalJourney(null);afterFinal()">開始最終旅程</button>
         </div>`+(ui.regroup?`<h2>選一張棄掉並重抽</h2>`+handHTML(()=>null):"");
    case "final_enemy_intro":
      return dragonHTML()+`<h2>最終敵人：用剩餘 ${g.hand.length} 張結算</h2>`+handHTML(()=>null)+
        `<div class="btns"><button class="primary" onclick="g.finalEnemy();afterFinal()">結算最終敵人</button></div>`;
    case "gameover":
      return `<div class="end"><div class="big">${g.result.win?"🏆 勝利！":"💀 失敗"}</div>
        <div>分數：<b>${g.result.score}</b></div>
        <div class="btns" style="margin-top:18px"><button class="primary" onclick="newGame()">再玩一局</button></div></div>`;
  }
  return "";
}
function dragonHTML(){
  const d=g.dragon;
  const arm=d.armor.map(a=>chip("shield",elc(a.element),a.value)).join("");
  const mp=d.mpTiers.map(t=>`<span class="tier">${chip("mountain",elc(t[1]),t[0])}${chip("hourglass","#cbd5e1",t[2])}</span>`).join("");
  const hp=d.hpTiers.map(t=>`<span class="tier">${chip("heart","#fca5a5",t[0])}${chip("sword",elc(t[1].element),t[1].value)}</span>`).join("");
  return `<div class="enc"><div class="nm">🐲 ${d.name}</div>
    <div class="chips big">${chip("init","#cbd5e1",d.initiative)}
      ${chip("boost","#fca5a5",d.earlyDamage.value)}${ic(d.earlyDamage.element,elc(d.earlyDamage.element),14)}
      ${arm}</div>
    <div class="muted" style="margin-top:4px">最終旅程 MP</div><div class="chips">${mp}</div>
    <div class="muted" style="margin-top:4px">最終敵人 HP</div><div class="chips">${hp}</div></div>`;
}

// ---- 互動 ----
function bindCards(){
  document.querySelectorAll(".card").forEach(el=>{
    el.onclick=()=>cardTap(parseInt(el.dataset.i,10));
  });
}
function cardTap(i){
  if(g.phase==="action"){
    const s=ui.sel;
    if(i===s.s){s.s=null;} else if(i===s.e){s.e=null;} else if(i===s.b){s.b=null;}
    else if(s.s===null)s.s=i; else if(s.e===null)s.e=i; else if(s.b===null)s.b=i;
    render();
  } else if(g.phase==="challenge" && ui.diverting){
    g.divert(i); ui.diverting=false; render();
  } else if(g.phase==="upgrade"){
    ui.upicks.push(i); render();
  } else if(g.phase==="final_journey_intro" && ui.regroup){
    ui.regroup=false; g.finalJourney(i); afterFinal();
  }
}
function act(){ g.toAction(); render(); }
function startDivert(){ ui.diverting=true; render(); }
function suggest(){
  const [s,e,b,t]=DOEGame.bestAssignment(g.hand,g.enc.encType,g.enc.target);
  ui.sel={s,e:e,b:b}; if(g.enc.encType==="enemy")ui.bt=t==="initiative"?"initiative":"attack"; render();
}
function confirmAction(){
  const s=ui.sel;
  const enemy=g.enc.encType==="enemy";
  const a={s:s.s,e:s.e,b:s.b,t:enemy?ui.bt:"move",negateRanged:g.enc.target.ability==="ranged"};
  g.resolveAction(a);
  ui.sel={s:null,e:null,b:null};
  render();
}
function doPenalty(){ g.applyPenalty(null); ui.upicks=[]; render(); }
function afterTurn(){ render(); }   // applyUpgrade 內部已 cleanup 並前進
function suggestUpgrade(){ ui.upicks=DOEGame.chooseUpgrades(g.hand,g.tx.r.xp); render(); }
function startRegroup(){ ui.regroup=true; render(); }
function afterFinal(){ render(); }

function setHint(){
  const h=document.getElementById("hint");
  const map={
    challenge:"面對遭遇，或繞道（棄關鍵卡+1手牌）",
    action:"點卡片指派：第1下法術、第2下元素、第3下Boost；其餘為預備",
    penalty:"點「結算懲罰」處理時間懲罰與傷害",
    upgrade:"點手牌升級（可重複），或用建議",
    final_journey_intro:"最終旅程：兩組行動自動配置；可先 Regroup",
    final_enemy_intro:"用剩餘手牌對龍做最後一擊",
    gameover:"看看分數，再玩一局！",
  };
  h.textContent=map[g.phase]||"";
}

try { newGame(); }
catch(e){
  document.getElementById('sub').textContent='發生錯誤';
  document.getElementById('main').innerHTML='<div class="banner">啟動失敗：'+(e&&e.message||e)+'</div>';
}
</script>
</body>
</html>
